<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>EL TIO J · Catálogo Neon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', 'Impact', sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
    body { background: radial-gradient(circle at 30% 20%, #1a0033 0%, #000000 100%); display: flex; justify-content: center; align-items: center; padding: 8px; position: relative; }
    body::before { content: "EL TIO J"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-12deg) scale(1.3); font-size: clamp(3rem, 18vw, 12rem); font-weight: 900; color: rgba(57, 255, 20, 0.05); white-space: nowrap; letter-spacing: 15px; text-transform: uppercase; pointer-events: none; z-index: 1; animation: floatLogo 25s infinite alternate ease-in-out; font-family: 'Impact', sans-serif; }
    @keyframes floatLogo { 0% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.3); opacity: 0.04; } 100% { transform: translate(-48%, -52%) rotate(-6deg) scale(1.38); opacity: 0.09; } }
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.88); backdrop-filter: blur(12px); border: 3px solid #39ff14; border-radius: 40px; box-shadow: 0 0 50px #39ff14, inset 0 0 20px rgba(57,255,20,0.2); display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    .header { padding: 1.5rem 1.5rem 0.8rem; text-align: center; border-bottom: 3px solid #ff00ff; background: linear-gradient(135deg, rgba(57,255,20,0.1), rgba(255,0,255,0.1)); }
    .logo-masquehigh { font-size: 4.2rem; font-weight: 900; color: #39ff14; text-shadow: 0 0 25px #39ff14, 0 0 5px #00ffff; line-height: 1.1; letter-spacing: 4px; }
    .logo-club { font-size: 3.2rem; font-weight: 900; letter-spacing: 15px; color: #ff00ff; text-shadow: 0 0 20px #ff00ff, 0 0 5px #39ff14; margin-top: -0.5rem; }
    .welcome { font-size: 1.4rem; color: #ffffff; background: linear-gradient(90deg, transparent, rgba(57,255,20,0.3), rgba(255,0,255,0.3), transparent); padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; text-shadow: 0 0 8px #39ff14; }
    
    /* Pestañas principales */
    .pestanas { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.4rem; padding: 0.8rem 1rem; }
    .pestana { background: rgba(0, 0, 0, 0.85); border: 2px solid; border-radius: 16px; padding: 0.5rem 0.1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; backdrop-filter: blur(4px); }
    .pestana.extracciones { border-color: #39ff14; color: #39ff14; box-shadow: 0 0 5px rgba(57,255,20,0.3); }
    .pestana.hierbas { border-color: #00ffff; color: #00ffff; }
    .pestana.hash { border-color: #ff6600; color: #ff6600; }
    .pestana.liados { border-color: #ffff00; color: #ffff00; }
    .pestana.munchies { border-color: #ff00ff; color: #ff00ff; }
    .pestana.eventos { border-color: #ff3366; color: #ff3366; }
    .pestana.activa { transform: scale(1.02); box-shadow: 0 0 25px currentColor; border-width: 3px; background: rgba(20, 20, 40, 0.95); }
    .pestana-icon { font-size: 2rem; }
    .pestana-text { font-size: 1rem; font-weight: 700; }
    
    .contenido { flex: 1; overflow-y: auto; padding: 1rem 1rem; }
    .panel { display: none; }
    .panel.activo { display: block; }
    
    .subseccion { background: rgba(0, 0, 0, 0.6); border: 1px solid #ff00ff; border-radius: 20px; padding: 1rem; margin-bottom: 1.2rem; box-shadow: 0 0 15px rgba(255,0,255,0.2); }
    .subseccion-titulo { font-size: 2rem; color: #ff00ff; text-shadow: 0 0 15px #ff00ff; margin-bottom: 1rem; padding-left: 0.8rem; border-left: 6px solid #39ff14; }
    
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    .producto-card { background: #0a0a15; border: 2px solid #39ff14; border-radius: 20px; padding: 0.8rem 0.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 0 10px rgba(57,255,20,0.3); transition: transform 0.1s ease; }
    .producto-card:hover { transform: scale(1.02); box-shadow: 0 0 20px #39ff14; }
    .producto-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #39ff14; box-shadow: 0 0 0 2px #ff00ff; margin-bottom: 0.5rem; }
    .producto-card h4 { font-size: 1.1rem; color: white; text-shadow: 0 0 5px #39ff14; margin-bottom: 0.25rem; }
    .producto-precio { font-size: 1.2rem; font-weight: 800; color: #39ff14; background: rgba(255, 0, 255, 0.2); padding: 0.2rem 1rem; border-radius: 30px; border: 1px solid #ff00ff; display: inline-block; }
    
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; }
    .liado-card { background: linear-gradient(145deg, #0f0f20, #050510); border: 3px solid #ffff00; border-radius: 20px; padding: 1.2rem 0.8rem; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 0 20px rgba(255, 255, 0, 0.4); }
    .liado-icon { font-size: 4rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px #ffff00); }
    .liado-card h4 { font-size: 1.3rem; color: #ffff00; text-shadow: 0 0 10px #ffff00; margin-bottom: 0.5rem; }
    .liado-precio { font-size: 1.3rem; font-weight: 800; color: white; background: rgba(255, 255, 0, 0.3); padding: 0.3rem 1.2rem; border-radius: 30px; border: 2px solid #ffff00; display: inline-block; }
    
    .munchies-categoria { background: rgba(20, 5, 30, 0.8); border: 2px solid #ff00ff; border-radius: 30px; padding: 1.5rem 1.2rem; margin-bottom: 1.5rem; }
    .categoria-titulo { font-size: 2.2rem; color: #ff00ff; text-shadow: 0 0 15px #ff00ff; margin-bottom: 1.5rem; border-bottom: 3px dotted #39ff14; padding-bottom: 0.5rem; display: inline-block; }
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .item-munchi { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.7); padding: 0.7rem 1.2rem; border-radius: 60px; border: 1px solid #39ff14; }
    .item-nombre { font-size: 1.3rem; color: #00ffff; text-transform: uppercase; font-weight: bold; }
    .item-precio { font-size: 1.4rem; font-weight: 800; color: #39ff14; text-shadow: 0 0 5px #39ff14; }
    
    /* Eventos */
    .eventos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; padding: 0.5rem; }
    .evento-card { background: transparent; border: 3px solid #ff3366; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1.2; position: relative; box-shadow: 0 0 20px rgba(255,51,102,0.4); }
    .evento-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .evento-delete { position: absolute; top: 5px; right: 5px; background: #ff00ff; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 20px; cursor: pointer; display: none; z-index: 100; box-shadow: 0 0 10px #ff00ff; }
    .admin-mode .evento-delete { display: block; }
    
    .save-indicator { position: fixed; bottom: 100px; right: 30px; background: #39ff14; color: black; padding: 15px 25px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 0 30px #39ff14; z-index: 2100; display: none; }

    /* Estilos admin */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .admin-card { background: #0a0a18; border: 2px solid; border-radius: 20px; padding: 15px; }
    .admin-img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; border: 2px solid #39ff14; }
    .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 2px solid #39ff14; border-radius: 10px; color: #00ffff; font-size: 1.3rem; }
    .admin-precio { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 2px solid #ff00ff; border-radius: 10px; color: #39ff14; font-size: 1.3rem; }
    .admin-file-input { display: none; }
    .admin-btn { width: 100%; padding: 10px; border: none; border-radius: 30px; font-size: 1.3rem; cursor: pointer; margin-bottom: 5px; font-weight: bold; }
    .btn-upload { background: #39ff14; color: #000; box-shadow: 0 0 10px #39ff14; }
    .btn-delete { background: #ff00ff; color: white; box-shadow: 0 0 10px #ff00ff; }
    .btn-add { background: #ffff00; color: black; box-shadow: 0 0 10px #ffff00; }
  </style>
</head>
<body>
  <main class="kiosco">
    <div class="header">
      <div class="logo">
        <div class="logo-masquehigh">EL TIO J</div>
        <div class="logo-club">CLUB</div>
      </div>
      <div class="welcome">🔥 BIENVENIDO A EL TIO J CLUB 🔥</div>
    </div>

    <!-- PESTAÑAS PRINCIPALES -->
    <div class="pestanas">
      <div class="pestana extracciones activa" data-pestana="extracciones">
        <div class="pestana-icon">⚡</div>
        <div class="pestana-text">EXTRACCIONES</div>
      </div>
      <div class="pestana hierbas" data-pestana="hierbas">
        <div class="pestana-icon">🌿</div>
        <div class="pestana-text">HIERBAS</div>
      </div>
      <div class="pestana hash" data-pestana="hash">
        <div class="pestana-icon">🍫</div>
        <div class="pestana-text">HASH</div>
      </div>
      <div class="pestana liados" data-pestana="liados">
        <div class="pestana-icon">🚬</div>
        <div class="pestana-text">LIADOS</div>
      </div>
      <div class="pestana munchies" data-pestana="munchies">
        <div class="pestana-icon">🍕</div>
        <div class="pestana-text">MUNCHIES</div>
      </div>
      <div class="pestana eventos" data-pestana="eventos">
        <div class="pestana-icon">🎉</div>
        <div class="pestana-text">EVENTOS</div>
      </div>
    </div>

    <div class="contenido">
      <div id="panel-extracciones" class="panel activo">
        <div class="subseccion">
          <h3 class="subseccion-titulo">⚡ EXTRACCIONES</h3>
          <div class="productos-grid" id="extracciones-grid"></div>
        </div>
      </div>
      <div id="panel-hierbas" class="panel">
        <div class="subseccion">
          <h3 class="subseccion-titulo">🌿 HIERBAS</h3>
          <div class="productos-grid" id="hierbas-grid"></div>
        </div>
      </div>
      <div id="panel-hash" class="panel">
        <div class="subseccion">
          <h3 class="subseccion-titulo">🟫 HASH</h3>
          <div class="productos-grid" id="hash-grid"></div>
        </div>
      </div>
      <div id="panel-liados" class="panel">
        <div class="subseccion" style="border-color: #ffff00;">
          <h3 class="subseccion-titulo" style="color: #ffff00; border-left-color: #ffff00;">🚬 PORROS LIADOS</h3>
          <div class="liados-grid" id="liados-grid"></div>
        </div>
      </div>
      <div id="panel-munchies" class="panel">
        <div class="munchies-grid">
          <div class="munchies-categoria">
            <div class="categoria-titulo">🥤 BEBIDAS</div>
            <div class="items-lista" id="refrescos-lista"></div>
          </div>
          <div class="munchies-categoria">
            <div class="categoria-titulo">🍿 PARA PICAR</div>
            <div class="items-lista" id="picar-lista"></div>
          </div>
        </div>
      </div>
      <div id="panel-eventos" class="panel">
        <div class="eventos-grid" id="eventos-grid"></div>
      </div>
    </div>
  </main>

  <!-- Botón ADMIN -->
  <div style="position: fixed; bottom: 30px; right: 30px; z-index: 2000;">
    <button id="btn-admin" onclick="mostrarLogin()" style="width: 70px; height: 70px; border-radius: 50%; background: #39ff14; border: 4px solid #ff00ff; color: black; font-size: 30px; box-shadow: 0 0 30px #39ff14; cursor: pointer;">⚙️</button>
  </div>

  <!-- PANEL LOGIN -->
  <div id="panel-login" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 2001; align-items: center; justify-content: center;">
    <div style="background: #0a0a18; border: 4px solid #39ff14; border-radius: 40px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 0 60px #ff00ff;">
      <h2 style="color: #39ff14; text-align: center; font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 15px #39ff14;">🔐 ADMIN</h2>
      <input type="password" id="login-password" placeholder="Contraseña" style="width: 100%; padding: 25px; font-size: 2rem; background: #000; border: 3px solid #ff00ff; border-radius: 30px; color: #00ffff; margin-bottom: 30px; text-align: center;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <button onclick="comprobarLogin()" style="background: #39ff14; border: none; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px #39ff14;">ENTRAR</button>
        <button onclick="cerrarLogin()" style="background: #ff00ff; border: none; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 0 15px #ff00ff;">CERRAR</button>
      </div>
      <p id="login-error" style="color: #ff00ff; text-align: center; font-size: 1.8rem; margin-top: 20px; display: none;">❌ Contraseña incorrecta</p>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panel-admin" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050510; z-index: 2002; overflow-y: auto; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="color: #39ff14; font-size: 2.5rem; text-shadow: 0 0 15px #39ff14;">✏️ EDITAR TODO</h2>
      <button onclick="cerrarAdmin()" style="background: #ff00ff; border: none; border-radius: 40px; padding: 15px 30px; font-size: 1.8rem; color: white; cursor: pointer; box-shadow: 0 0 15px #ff00ff;">CERRAR</button>
    </div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
      <button onclick="mostrarSeccion('extracciones')" style="flex:1; background:#39ff14; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; font-weight:bold;">⚡ EXTRACCIONES</button>
      <button onclick="mostrarSeccion('hierbas')" style="flex:1; background:#00ffff; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; font-weight:bold;">🌿 HIERBAS</button>
      <button onclick="mostrarSeccion('hash')" style="flex:1; background:#ff6600; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; font-weight:bold;">🟫 HASH</button>
      <button onclick="mostrarSeccion('liados')" style="flex:1; background:#ffff00; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; font-weight:bold;">🚬 LIADOS</button>
      <button onclick="mostrarSeccion('refrescos')" style="flex:1; background:#ff00ff; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; color:white; font-weight:bold;">🥤 BEBIDAS</button>
      <button onclick="mostrarSeccion('picar')" style="flex:1; background:#ff00ff; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; color:white; font-weight:bold;">🍿 PICAR</button>
      <button onclick="mostrarSeccion('eventos')" style="flex:1; background:#ff3366; border:none; border-radius:20px; padding:15px; font-size:1.2rem; cursor:pointer; font-weight:bold;">🎉 EVENTOS</button>
    </div>
    
    <div id="admin-contenido" style="background: #0a0a18; border-radius: 30px; padding: 20px; margin-bottom: 20px; border: 1px solid #39ff14;">
      <p style="color: #00ffff; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>
    </div>
    
    <button onclick="guardarTodo()" style="width: 100%; background: #39ff14; border: 4px solid #ff00ff; border-radius: 60px; padding: 25px; font-size: 2.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #39ff14;">💾 GUARDAR CAMBIOS</button>
  </div>

  <div id="saveIndicator" class="save-indicator">✅ GUARDADO</div>

  <script>
    const CONTRASENA = "alfre123";
    const STORAGE_KEY = 'eltioj_datos_v1';

    const DATOS_POR_DEFECTO = {
      extracciones: [
        { img: 'images/placeholder.jpg', nombre: 'BHO TROPICANA CHERRY', precio: '28€/g' },
        { img: 'images/placeholder.jpg', nombre: 'TAITELLA', precio: '24€/g' },
        { img: 'images/placeholder.jpg', nombre: 'BHO AMNESIA PLUS', precio: '24€/g' },
        { img: 'images/placeholder.jpg', nombre: 'BHO AMNESIA', precio: '20€/g' },
        { img: 'images/placeholder.jpg', nombre: 'ICE MAC1 PLUS', precio: '18€/g' },
        { img: 'images/placeholder.jpg', nombre: 'ICE MAC1', precio: '10€/g' },
        { img: 'images/placeholder.jpg', nombre: 'ICE AMNESIA', precio: '15€/g' },
        { img: 'images/placeholder.jpg', nombre: 'FORBBIDEN FROZEN', precio: '8€/g' }
      ],
      hierbas: [
        { img: 'images/placeholder.jpg', nombre: 'LONDON CAKE', precio: '8€/g' },
        { img: 'images/placeholder.jpg', nombre: 'CREAM CARAMEL', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'AMNESIA', precio: '4€/g' },
        { img: 'images/placeholder.jpg', nombre: 'TANGIE', precio: '7€/g' },
        { img: 'images/placeholder.jpg', nombre: 'DANCE HALL', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'MELON', precio: '5€/g' },
        { img: 'images/placeholder.jpg', nombre: 'TROPICANA CHERRY', precio: '8€/g' },
        { img: 'images/placeholder.jpg', nombre: 'GELATO X PURPLE', precio: '7€/g' },
        { img: 'images/placeholder.jpg', nombre: 'JEALOUSY', precio: '7€/g' },
        { img: 'images/placeholder.jpg', nombre: 'PINE LINK', precio: '7€/g' },
        { img: 'images/placeholder.jpg', nombre: 'SIDERAL', precio: '7€/g' }
      ],
      hash: [
        { img: 'images/placeholder.jpg', nombre: 'GORILA', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'OG DRY', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'RUNTZ', precio: '5€/g' },
        { img: 'images/placeholder.jpg', nombre: 'BANANA', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'WONKA', precio: '5€/g' }
      ],
      liados: [
        { nombre: 'CRITICAL X GORILA', precio: '1x3€ | 2x5€' },
        { nombre: 'AMNESIA', precio: '1x3€ | 2x5€' },
        { nombre: 'TROPICANA', precio: '1x3€ | 2x5€' },
        { nombre: 'CANDY', precio: '1x3€ | 2x5€' }
      ],
      refrescos: [
        { nombre: 'AQUARIUS', precio: '2€' }, { nombre: 'FANTA', precio: '2€' }, { nombre: 'NESTEA', precio: '2€' },
        { nombre: 'ESTRELLA', precio: '2€' }, { nombre: 'REDBULL', precio: '2.50€' }, { nombre: 'CAFÉ SOLO', precio: '1€' },
        { nombre: 'COCACOLA', precio: '2€' }, { nombre: 'MONSTER', precio: '2.50€' }, { nombre: 'AGUA', precio: '1.50€' },
        { nombre: 'HEINEKEN', precio: '2€' }, { nombre: 'COMB. LATA', precio: '5€' }, { nombre: 'CAFÉ CON LECHE', precio: '1.20€' }
      ],
      picar: [
        { nombre: 'PATATAS', precio: '1.50€' }, { nombre: 'CHUCHAS', precio: '1.50€' }, { nombre: 'PALOMITAS', precio: '1.20€' }
      ],
      eventos: ['images/placeholder.jpg', 'images/placeholder.jpg', 'images/placeholder.jpg', 'images/placeholder.jpg']
    };

    let datosActuales = JSON.parse(JSON.stringify(DATOS_POR_DEFECTO));

    document.querySelectorAll('.pestana').forEach(p => {
      p.addEventListener('click', function() {
        document.querySelectorAll('.pestana').forEach(p => p.classList.remove('activa'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('activo'));
        this.classList.add('activa');
        document.getElementById('panel-' + this.dataset.pestana).classList.add('activo');
      });
    });

    function mostrarLogin() { document.getElementById('panel-login').style.display = 'flex'; }
    function cerrarLogin() { document.getElementById('panel-login').style.display = 'none'; document.getElementById('login-password').value = ''; }
    function comprobarLogin() {
      if (document.getElementById('login-password').value === CONTRASENA) {
        document.getElementById('panel-login').style.display = 'none';
        document.getElementById('panel-admin').style.display = 'block';
        document.getElementById('login-error').style.display = 'none';
        mostrarSeccion('extracciones');
        actualizarVisibilidadBotonesEventos();
      } else { document.getElementById('login-error').style.display = 'block'; }
    }
    function cerrarAdmin() { document.getElementById('panel-admin').style.display = 'none'; actualizarVisibilidadBotonesEventos(); }

    function comprimirImagen(dataUrl, calidad = 0.7, maxAncho = 600) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let ancho = img.width, alto = img.height;
          if (ancho > maxAncho) { alto = (maxAncho / ancho) * alto; ancho = maxAncho; }
          canvas.width = ancho; canvas.height = alto;
          canvas.getContext('2d').drawImage(img, 0, 0, ancho, alto);
          resolve(canvas.toDataURL('image/jpeg', calidad));
        };
        img.src = dataUrl;
      });
    }

    function guardarDatos() { localStorage.setItem(STORAGE_KEY, JSON.stringify(datosActuales)); }
    function cargarDatos() {
      const guardado = localStorage.getItem(STORAGE_KEY);
      if (guardado) { try { datosActuales = JSON.parse(guardado); } catch(e) {} }
      datosActuales.extracciones = datosActuales.extracciones || DATOS_POR_DEFECTO.extracciones;
      datosActuales.hierbas = datosActuales.hierbas || DATOS_POR_DEFECTO.hierbas;
      datosActuales.hash = datosActuales.hash || DATOS_POR_DEFECTO.hash;
      datosActuales.liados = datosActuales.liados || DATOS_POR_DEFECTO.liados;
      datosActuales.refrescos = datosActuales.refrescos || DATOS_POR_DEFECTO.refrescos;
      datosActuales.picar = datosActuales.picar || DATOS_POR_DEFECTO.picar;
      datosActuales.eventos = datosActuales.eventos || DATOS_POR_DEFECTO.eventos;
      renderizarTodo();
    }

    function renderizarTodo() {
      renderizarExtracciones(); renderizarHierbas(); renderizarHash(); renderizarLiados(); renderizarRefrescos(); renderizarPicar(); renderizarEventos();
    }
    function renderizarExtracciones() { const grid = document.getElementById('extracciones-grid'); grid.innerHTML = ''; datosActuales.extracciones.forEach((item, i) => { grid.innerHTML += `<div class="producto-card"><img src="${item.img}" id="extracciones-img-${i}"><h4 id="extracciones-nombre-${i}">${item.nombre}</h4><div class="producto-precio" id="extracciones-precio-${i}">${item.precio}</div></div>`; }); }
    function renderizarHierbas() { const grid = document.getElementById('hierbas-grid'); grid.innerHTML = ''; datosActuales.hierbas.forEach((item, i) => { grid.innerHTML += `<div class="producto-card"><img src="${item.img}" id="hierbas-img-${i}"><h4 id="hierbas-nombre-${i}">${item.nombre}</h4><div class="producto-precio" id="hierbas-precio-${i}">${item.precio}</div></div>`; }); }
    function renderizarHash() { const grid = document.getElementById('hash-grid'); grid.innerHTML = ''; datosActuales.hash.forEach((item, i) => { grid.innerHTML += `<div class="producto-card"><img src="${item.img}" id="hash-img-${i}"><h4 id="hash-nombre-${i}">${item.nombre}</h4><div class="producto-precio" id="hash-precio-${i}">${item.precio}</div></div>`; }); }
    function renderizarLiados() { const grid = document.getElementById('liados-grid'); grid.innerHTML = ''; datosActuales.liados.forEach((item, i) => { grid.innerHTML += `<div class="liado-card"><div class="liado-icon">🚬</div><h4 id="liados-nombre-${i}">${item.nombre}</h4><div class="liado-precio" id="liados-precio-${i}">${item.precio}</div></div>`; }); }
    function renderizarRefrescos() { const lista = document.getElementById('refrescos-lista'); lista.innerHTML = ''; datosActuales.refrescos.forEach((item, i) => { lista.innerHTML += `<div class="item-munchi"><span class="item-nombre" id="refresco-nombre-${i}">${item.nombre}</span><span class="item-precio" id="refresco-precio-${i}">${item.precio}</span></div>`; }); }
    function renderizarPicar() { const lista = document.getElementById('picar-lista'); lista.innerHTML = ''; datosActuales.picar.forEach((item, i) => { lista.innerHTML += `<div class="item-munchi"><span class="item-nombre" id="picar-nombre-${i}">${item.nombre}</span><span class="item-precio" id="picar-precio-${i}">${item.precio}</span></div>`; }); }
    function renderizarEventos() { const grid = document.getElementById('eventos-grid'); grid.innerHTML = ''; datosActuales.eventos.forEach((img, i) => { grid.innerHTML += `<div class="evento-card"><img src="${img}" id="evento-img-${i}"><button class="evento-delete" onclick="eliminarEvento(${i})" style="display: ${document.getElementById('panel-admin')?.style.display === 'block' ? 'block' : 'none'}">✖</button></div>`; }); }

    function sincronizarDatosDesdeDOM() {
      const extraccionesCards = document.querySelectorAll('#extracciones-grid .producto-card');
      if (extraccionesCards.length) datosActuales.extracciones = Array.from(extraccionesCards).map(card => ({ img: card.querySelector('img').src, nombre: card.querySelector('h4').textContent, precio: card.querySelector('.producto-precio').textContent }));
      const hierbasCards = document.querySelectorAll('#hierbas-grid .producto-card');
      if (hierbasCards.length) datosActuales.hierbas = Array.from(hierbasCards).map(card => ({ img: card.querySelector('img').src, nombre: card.querySelector('h4').textContent, precio: card.querySelector('.producto-precio').textContent }));
      const hashCards = document.querySelectorAll('#hash-grid .producto-card');
      if (hashCards.length) datosActuales.hash = Array.from(hashCards).map(card => ({ img: card.querySelector('img').src, nombre: card.querySelector('h4').textContent, precio: card.querySelector('.producto-precio').textContent }));
      const liadosCards = document.querySelectorAll('#liados-grid .liado-card');
      if (liadosCards.length) datosActuales.liados = Array.from(liadosCards).map(card => ({ nombre: card.querySelector('h4').textContent, precio: card.querySelector('.liado-precio').textContent }));
      const refrescosItems = document.querySelectorAll('#refrescos-lista .item-munchi');
      if (refrescosItems.length) datosActuales.refrescos = Array.from(refrescosItems).map(item => ({ nombre: item.querySelector('.item-nombre').textContent, precio: item.querySelector('.item-precio').textContent }));
      const picarItems = document.querySelectorAll('#picar-lista .item-munchi');
      if (picarItems.length) datosActuales.picar = Array.from(picarItems).map(item => ({ nombre: item.querySelector('.item-nombre').textContent, precio: item.querySelector('.item-precio').textContent }));
      const eventosImgs = document.querySelectorAll('#eventos-grid img');
      if (eventosImgs.length) datosActuales.eventos = Array.from(eventosImgs).map(img => img.src);
    }

    function mostrarSeccion(seccion) {
      sincronizarDatosDesdeDOM();
      let html = '';
      if (seccion === 'extracciones') {
        html = '<h3 style="color:#39ff14; margin-bottom:20px;">⚡ EXTRACCIONES</h3><div class="admin-grid">';
        datosActuales.extracciones.forEach((item, i) => { html += `<div class="admin-card" style="border-color:#39ff14;"><img src="${item.img}" id="extracciones-img-admin-${i}" class="admin-img"><input type="file" id="extracciones-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagen('extracciones', ${i})"><button onclick="document.getElementById('extracciones-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO</button><input type="text" id="extracciones-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarCampo('extracciones', 'nombre', ${i}, this.value)"><input type="text" id="extracciones-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarCampo('extracciones', 'precio', ${i}, this.value)"><button onclick="eliminarProducto('extracciones', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="anadirProducto(\'extracciones\')" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR PRODUCTO</button>';
      } else if (seccion === 'hierbas') {
        html = '<h3 style="color:#00ffff; margin-bottom:20px;">🌿 HIERBAS</h3><div class="admin-grid">';
        datosActuales.hierbas.forEach((item, i) => { html += `<div class="admin-card" style="border-color:#00ffff;"><img src="${item.img}" id="hierbas-img-admin-${i}" class="admin-img"><input type="file" id="hierbas-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagen('hierbas', ${i})"><button onclick="document.getElementById('hierbas-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO</button><input type="text" id="hierbas-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarCampo('hierbas', 'nombre', ${i}, this.value)"><input type="text" id="hierbas-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarCampo('hierbas', 'precio', ${i}, this.value)"><button onclick="eliminarProducto('hierbas', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="anadirProducto(\'hierbas\')" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR HIERBA</button>';
      } else if (seccion === 'hash') {
        html = '<h3 style="color:#ff6600; margin-bottom:20px;">🟫 HASH</h3><div class="admin-grid">';
        datosActuales.hash.forEach((item, i) => { html += `<div class="admin-card" style="border-color:#ff6600;"><img src="${item.img}" id="hash-img-admin-${i}" class="admin-img"><input type="file" id="hash-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagen('hash', ${i})"><button onclick="document.getElementById('hash-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO</button><input type="text" id="hash-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarCampo('hash', 'nombre', ${i}, this.value)"><input type="text" id="hash-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarCampo('hash', 'precio', ${i}, this.value)"><button onclick="eliminarProducto('hash', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="anadirProducto(\'hash\')" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR HASH</button>';
      } else if (seccion === 'liados') {
        html = '<h3 style="color:#ffff00; margin-bottom:20px;">🚬 LIADOS</h3><div class="admin-grid">';
        datosActuales.liados.forEach((item, i) => { html += `<div class="admin-card" style="border-color:#ffff00;"><div style="font-size:4rem; text-align:center;">🚬</div><input type="text" id="liados-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" style="border-color:#ffff00; color:#ffff00;" placeholder="Nombre" onchange="actualizarCampo('liados', 'nombre', ${i}, this.value)"><input type="text" id="liados-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" style="border-color:#ffff00; color:#ffff00;" placeholder="Precio" onchange="actualizarCampo('liados', 'precio', ${i}, this.value)"><button onclick="eliminarProducto('liados', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="anadirProducto(\'liados\')" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR LIADO</button>';
      } else if (seccion === 'refrescos') {
        html = '<h3 style="color:#ff00ff; margin-bottom:20px;">🥤 BEBIDAS</h3><div class="admin-grid">';
        datosActuales.refrescos.forEach((item, i) => { html += `<div class="admin-card" style="border-color:#ff00ff;"><input type="text" id="refresco-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarCampo('refrescos', 'nombre', ${i}, this.value)"><input type="text" id="refresco-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarCampo('refrescos', 'precio', ${i}, this.value)"><button onclick="eliminarProducto('refrescos', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="anadirProducto(\'refrescos\')" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR BEBIDA</button>';
      } else if (seccion === 'picar') {
        html = '<h3 style="color:#ff00ff; margin-bottom:20px;">🍿 PARA PICAR</h3><div class="admin-grid">';
        datosActuales.picar.forEach((item, i) => { html += `<div class="admin-card" style="border-color:#ff00ff;"><input type="text" id="picar-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarCampo('picar', 'nombre', ${i}, this.value)"><input type="text" id="picar-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarCampo('picar', 'precio', ${i}, this.value)"><button onclick="eliminarProducto('picar', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="anadirProducto(\'picar\')" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR PRODUCTO</button>';
      } else if (seccion === 'eventos') {
        html = '<h3 style="color:#ff3366; margin-bottom:20px;">🎉 EVENTOS</h3><div class="admin-grid">';
        datosActuales.eventos.forEach((img, i) => { html += `<div class="admin-card" style="border-color:#ff3366;"><img src="${img}" id="evento-img-admin-${i}" class="admin-img"><input type="file" id="evento-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenEvento(${i})"><button onclick="document.getElementById('evento-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO ${i+1}</button><button onclick="eliminarEvento(${i})" class="admin-btn btn-delete">🗑️ ELIMINAR CARTEL</button></div>`; });
        html += '</div><button onclick="anadirEvento()" class="btn-add" style="width:100%; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR NUEVO CARTEL</button>';
      }
      document.getElementById('admin-contenido').innerHTML = html;
    }

    function actualizarCampo(tipo, campo, index, valor) {
      if (campo === 'nombre') { datosActuales[tipo][index].nombre = valor; const el = document.getElementById(`${tipo}-nombre-${index}`); if (el) el.textContent = valor; }
      else if (campo === 'precio') { datosActuales[tipo][index].precio = valor; const el = document.getElementById(`${tipo}-precio-${index}`); if (el) el.textContent = valor; }
      guardarDatos(); mostrarIndicator();
    }

    async function subirImagen(tipo, index) {
      const input = document.getElementById(`${tipo}-file-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          document.getElementById(`${tipo}-img-admin-${index}`).src = imgComprimida;
          const imgPrincipal = document.getElementById(`${tipo}-img-${index}`);
          if (imgPrincipal) imgPrincipal.src = imgComprimida;
          datosActuales[tipo][index].img = imgComprimida;
          guardarDatos(); mostrarIndicator();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function subirImagenEvento(index) {
      const input = document.getElementById(`evento-file-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          document.getElementById(`evento-img-admin-${index}`).src = imgComprimida;
          const imgPrincipal = document.getElementById(`evento-img-${index}`);
          if (imgPrincipal) imgPrincipal.src = imgComprimida;
          datosActuales.eventos[index] = imgComprimida;
          guardarDatos(); mostrarIndicator();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function anadirEvento() { datosActuales.eventos.push('images/placeholder.jpg'); renderizarEventos(); guardarDatos(); mostrarSeccion('eventos'); mostrarIndicator(); }
    function eliminarEvento(index) { if (!confirm('¿Eliminar este cartel?')) return; datosActuales.eventos.splice(index, 1); renderizarEventos(); guardarDatos(); mostrarSeccion('eventos'); mostrarIndicator(); }
    function anadirProducto(tipo) {
      if (tipo === 'extracciones') { datosActuales.extracciones.push({ img: 'images/placeholder.jpg', nombre: 'NUEVA EXTRACCIÓN', precio: '0€' }); renderizarExtracciones(); }
      else if (tipo === 'hierbas') { datosActuales.hierbas.push({ img: 'images/placeholder.jpg', nombre: 'NUEVA HIERBA', precio: '0€' }); renderizarHierbas(); }
      else if (tipo === 'hash') { datosActuales.hash.push({ img: 'images/placeholder.jpg', nombre: 'NUEVO HASH', precio: '0€' }); renderizarHash(); }
      else if (tipo === 'liados') { datosActuales.liados.push({ nombre: 'NUEVO LIADO', precio: '0€' }); renderizarLiados(); }
      else if (tipo === 'refrescos') { datosActuales.refrescos.push({ nombre: 'NUEVA BEBIDA', precio: '0€' }); renderizarRefrescos(); }
      else if (tipo === 'picar') { datosActuales.picar.push({ nombre: 'NUEVO PRODUCTO', precio: '0€' }); renderizarPicar(); }
      guardarDatos(); mostrarSeccion(tipo); mostrarIndicator();
    }
    function eliminarProducto(tipo, index) { if (!confirm('¿Eliminar este producto?')) return; datosActuales[tipo].splice(index, 1); if (tipo === 'extracciones') renderizarExtracciones(); else if (tipo === 'hierbas') renderizarHierbas(); else if (tipo === 'hash') renderizarHash(); else if (tipo === 'liados') renderizarLiados(); else if (tipo === 'refrescos') renderizarRefrescos(); else if (tipo === 'picar') renderizarPicar(); guardarDatos(); mostrarSeccion(tipo); mostrarIndicator(); }
    function guardarTodo() { sincronizarDatosDesdeDOM(); guardarDatos(); mostrarIndicator(); }
    function mostrarIndicator() { const ind = document.getElementById('saveIndicator'); ind.style.display = 'block'; setTimeout(() => ind.style.display = 'none', 2000); }
    function actualizarVisibilidadBotonesEventos() { const adminAbierto = document.getElementById('panel-admin').style.display === 'block'; document.querySelectorAll('.evento-delete').forEach(btn => btn.style.display = adminAbierto ? 'block' : 'none'); }
    const observer = new MutationObserver(actualizarVisibilidadBotonesEventos);
    observer.observe(document.getElementById('panel-admin'), { attributes: true, attributeFilter: ['style'] });
    window.addEventListener('load', cargarDatos);
  </script>
</body>
</html>
