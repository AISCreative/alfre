<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0c14">
  <link rel="manifest" href="manifest.json">
  <title>El Tio J · Catálogo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c14; }
    body { background: radial-gradient(circle at 30% 30%, #1a2a3a 0%, #030408 100%); display: flex; justify-content: center; align-items: center; padding: 12px; position: relative; }
    body::before { content: "EL TIO J"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; color: rgba(255, 204, 0, 0.08); white-space: nowrap; letter-spacing: 12px; text-transform: uppercase; pointer-events: none; z-index: 1; animation: floatLogo 20s infinite alternate ease-in-out; }
    @keyframes floatLogo { 0% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); opacity: 0.08; } 100% { transform: translate(-48%, -52%) rotate(-8deg) scale(1.25); opacity: 0.12; } }
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 2px solid #ffcc00; border-radius: 30px; box-shadow: 0 0 40px #ffcc0066; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    .header { padding: 1.5rem 1.5rem 0.8rem; text-align: center; border-bottom: 2px solid #ff0000; }
    .logo-masquehigh { font-size: 4.8rem; font-weight: 900; background: linear-gradient(135deg, #ff0000, #ffcc00, #008000); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 25px #ffcc00; line-height: 1.1; }
    .logo-club { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; color: #ffcc00; margin-top: -0.5rem; text-shadow: 0 0 10px #ff0000; }
    .welcome { font-size: 1.6rem; color: #ffffff; background: linear-gradient(90deg, transparent, rgba(255, 204, 0, 0.2), transparent); padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; }
    
    /* Pestañas dinámicas - GRANDES para tablet */
    .pestanas-wrapper {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 1rem 1rem;
      scrollbar-width: thin;
    }
    .pestanas { display: flex; gap: 1rem; min-width: max-content; }
    .pestana { 
      background: rgba(10, 10, 20, 0.9); 
      border: 2px solid; 
      border-radius: 20px; 
      padding: 1rem 1.8rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      min-width: 150px; 
    }
    .pestana-icon { font-size: 2.5rem; }
    .pestana-text { font-size: 1.3rem; font-weight: 700; white-space: nowrap; color: white; letter-spacing: 1px; }
    .pestana.activa { transform: scale(1.02); box-shadow: 0 0 20px currentColor; border-width: 3px; background: rgba(30, 30, 40, 0.95); }
    .pestana.activa .pestana-text { color: white; }
    
    .contenido { flex: 1; overflow-y: auto; padding: 1.2rem; }
    .panel { display: none; }
    .panel.activo { display: block; }
    
    .subseccion { background: rgba(0, 0, 0, 0.5); border: 1px solid #ffcc00; border-radius: 24px; padding: 1.2rem; margin-bottom: 1.5rem; }
    .subseccion-titulo { font-size: 2.2rem; color: #ffcc00; text-shadow: 0 0 10px #ff0000; margin-bottom: 1.2rem; padding-left: 1rem; border-left: 8px solid #ffcc00; }
    
    /* PRODUCTOS - MÁS GRANDES para Lenovo Tab P11 */
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
    .producto-card { background: #0d0f1a; border: 2px solid #3a2b4a; border-radius: 24px; padding: 1.2rem 0.8rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .producto-card img { width: 130px; height: 130px; object-fit: cover; border-radius: 50%; border: 3px solid #ffcc00; box-shadow: 0 0 0 2px #ff0000; margin-bottom: 0.8rem; }
    .producto-card h4 { font-size: 1.4rem; color: white; text-shadow: 0 0 5px #ffcc00; margin-bottom: 0.5rem; }
    .producto-precio { font-size: 1.5rem; font-weight: 800; color: #ffcc00; background: rgba(255, 204, 0, 0.2); padding: 0.3rem 1.2rem; border-radius: 40px; border: 1px solid #ff0000; display: inline-block; }
    
    /* LIADOS - MÁS GRANDES */
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
    .liado-card { background: linear-gradient(145deg, #1a1a2a, #0d0f1a); border: 3px solid #ffaa00; border-radius: 24px; padding: 1.5rem 1rem; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 0 15px rgba(255, 170, 0, 0.3); }
    .liado-icon { font-size: 5rem; margin-bottom: 0.8rem; filter: drop-shadow(0 0 10px #ffaa00); }
    .liado-card h4 { font-size: 1.6rem; color: #ffaa00; text-shadow: 0 0 10px #ffaa00; margin-bottom: 0.8rem; }
    .liado-precio { font-size: 1.5rem; font-weight: 800; color: white; background: rgba(255, 170, 0, 0.3); padding: 0.4rem 1.5rem; border-radius: 40px; border: 2px solid #ffaa00; display: inline-block; }
    
    /* MUNCHIES - MÁS GRANDES */
    .munchies-categoria { background: rgba(20, 5, 25, 0.7); border: 2px solid #ffcc00; border-radius: 30px; padding: 1.5rem 1.5rem; margin-bottom: 1.5rem; }
    .categoria-titulo { font-size: 2.8rem; color: #ffcc00; text-shadow: 0 0 15px #ff0000; margin-bottom: 1.5rem; border-bottom: 3px dotted #ffcc00; padding-bottom: 0.5rem; display: inline-block; }
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .item-munchi { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.6); padding: 1rem 1.5rem; border-radius: 60px; border: 1px solid #ffcc00; }
    .item-nombre { font-size: 1.5rem; color: white; text-transform: uppercase; }
    .item-precio { font-size: 1.6rem; font-weight: 800; color: #ffcc00; }
    
    /* EVENTOS */
    .eventos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; padding: 0.5rem; }
    .evento-card { background: transparent; border: 3px solid #ffff00; border-radius: 24px; overflow: hidden; aspect-ratio: 1/1.2; position: relative; }
    .evento-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .evento-delete { position: absolute; top: 8px; right: 8px; background: #ff18d0; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 22px; cursor: pointer; display: none; z-index: 100; }
    .admin-mode .evento-delete { display: block; }
    
    .save-indicator { position: fixed; bottom: 100px; right: 30px; background: #ffcc00; color: black; padding: 15px 25px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 0 20px #ffcc00; z-index: 2100; display: none; }

    /* Estilos admin */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .admin-card { background: #0d0f1a; border: 2px solid; border-radius: 20px; padding: 15px; }
    .admin-img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; border: 2px solid #ffcc00; }
    .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 2px solid #ffcc00; border-radius: 10px; color: white; font-size: 1.4rem; }
    .admin-precio { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 2px solid #ff0000; border-radius: 10px; color: #ffcc00; font-size: 1.4rem; }
    .admin-file-input { display: none; }
    .admin-btn { width: 100%; padding: 12px; border: none; border-radius: 30px; font-size: 1.4rem; cursor: pointer; margin-bottom: 5px; font-weight: bold; }
    .btn-upload { background: #ffcc00; color: black; }
    .btn-delete { background: #ff0000; color: white; }
    .btn-add { background: #ffff00; color: black; }
    .seccion-item-admin {
      background: #0d0f1a;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 20px;
      border-left: 6px solid #ffcc00;
    }
  </style>
</head>
<body>
  <main class="kiosco">
    <div class="header">
      <div class="logo">
        <div class="logo-masquehigh">EL TIO J</div>
        <div class="logo-club">CLUB</div>
      </div>
      <div class="welcome">✨ Bienvenido a El Tio J Club ✨</div>
    </div>

    <div class="pestanas-wrapper">
      <div class="pestanas" id="pestanasContainer"></div>
    </div>

    <div class="contenido" id="contenidoPaneles"></div>
  </main>

  <!-- Botón ADMIN -->
  <div style="position: fixed; bottom: 30px; right: 30px; z-index: 2000;">
    <button id="btn-admin" onclick="mostrarLogin()" style="width: 80px; height: 80px; border-radius: 50%; background: #ffcc00; border: 4px solid #ff0000; color: black; font-size: 36px; box-shadow: 0 0 30px #ffcc00; cursor: pointer;">⚙️</button>
  </div>

  <!-- PANEL LOGIN -->
  <div id="panel-login" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2001; align-items: center; justify-content: center;">
    <div style="background: #0b0c14; border: 4px solid #ffcc00; border-radius: 40px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 0 60px #ff0000;">
      <h2 style="color: #ffcc00; text-align: center; font-size: 3rem; margin-bottom: 30px;">🔐 ADMIN</h2>
      <input type="password" id="login-password" placeholder="Contraseña" style="width: 100%; padding: 25px; font-size: 2rem; background: #1a1a2a; border: 3px solid #ff0000; border-radius: 30px; color: white; margin-bottom: 30px; text-align: center;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <button onclick="comprobarLogin()" style="background: #ffcc00; border: none; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; cursor: pointer;">ENTRAR</button>
        <button onclick="cerrarLogin()" style="background: #ff0000; border: none; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; color: white; cursor: pointer;">CERRAR</button>
      </div>
      <p id="login-error" style="color: #ff0000; text-align: center; font-size: 1.8rem; margin-top: 20px; display: none;">❌ Contraseña incorrecta</p>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panel-admin" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c14; z-index: 2002; overflow-y: auto; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
      <h2 style="color: #ffcc00; font-size: 2.5rem;">✏️ EDITAR TODO</h2>
      <div style="display: flex; gap: 10px;">
        <button id="addNewSectionBtn" style="background: #ffcc00; border: none; border-radius: 40px; padding: 12px 24px; font-size: 1.4rem; font-weight: bold; cursor: pointer;">➕ AÑADIR SECCIÓN</button>
        <button onclick="cerrarAdmin()" style="background: #ff0000; border: none; border-radius: 40px; padding: 12px 24px; font-size: 1.4rem; color: white; cursor: pointer;">CERRAR</button>
      </div>
    </div>
    
    <div id="seccionesAdminList" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;" id="adminTabsContainer"></div>
    
    <div id="admin-contenido" style="background: #1a1a2a; border-radius: 30px; padding: 20px; margin-bottom: 20px;">
      <p style="color: white; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>
    </div>
    
    <button onclick="guardarTodo()" style="width: 100%; background: #ffcc00; border: 4px solid #ff0000; border-radius: 60px; padding: 25px; font-size: 2.5rem; font-weight: bold; cursor: pointer;">💾 GUARDAR CAMBIOS</button>
  </div>

  <div id="saveIndicator" class="save-indicator">✅ GUARDADO</div>

  <script>
    const CONTRASENA = "alfre123";
    const STORAGE_KEY = 'eltioj_datos_secciones_v5';

    let secciones = [
      { id: "extracciones", nombre: "EXTRACCIONES", icono: "⚡", tipo: "productos", items: [] },
      { id: "hierbas", nombre: "HIERBAS", icono: "🌿", tipo: "productos", items: [] },
      { id: "hash", nombre: "HASH", icono: "🍫", tipo: "productos", items: [] },
      { id: "liados", nombre: "LIADOS", icono: "🚬", tipo: "liados", items: [] },
      { id: "munchies", nombre: "MUNCHIES", icono: "🍕", tipo: "munchies", sub: { bebidas: [], picar: [] } },
      { id: "eventos", nombre: "EVENTOS", icono: "🎉", tipo: "eventos", items: [] }
    ];

    const DEFAULT_EXTRA = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff0000"/%3E%3Ctext x="50" y="55" fill="%23ffcc00" font-size="12" text-anchor="middle"%3EBHO%3C/text%3E%3C/svg%3E', nombre: 'BHO TROPICANA CHERRY', precio: '28€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23008000"/%3E%3Ctext x="50" y="55" fill="%23ffcc00" font-size="12"%3EICE%3C/text%3E%3C/svg%3E', nombre: 'ICE MAC1 PLUS', precio: '18€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ffcc00"/%3E%3Ctext x="50" y="55" fill="black"%3ETAITELLA%3C/text%3E%3C/svg%3E', nombre: 'TAITELLA', precio: '24€/g' }
    ];
    const DEFAULT_HIERBAS = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23008000"/%3E%3Ctext x="50" y="55" fill="%23ffcc00"%3ELONDON%3C/text%3E%3C/svg%3E', nombre: 'LONDON CAKE', precio: '8€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff0000"/%3E%3Ctext x="50" y="55" fill="%23ffcc00"%3EAMNESIA%3C/text%3E%3C/svg%3E', nombre: 'AMNESIA', precio: '4€/g' }
    ];
    const DEFAULT_HASH = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23804020"/%3E%3Ctext x="50" y="55" fill="%23ffcc00"%3EGORILA%3C/text%3E%3C/svg%3E', nombre: 'GORILA', precio: '6€/g' }
    ];
    const DEFAULT_LIADOS = [
      { nombre: 'CRITICAL X GORILA', precio: '1x3€ | 2x5€' },
      { nombre: 'AMNESIA', precio: '1x3€ | 2x5€' }
    ];
    const DEFAULT_BEBIDAS = [{ nombre: 'COCACOLA', precio: '2€' }, { nombre: 'AGUA', precio: '1.50€' }];
    const DEFAULT_PICAR = [{ nombre: 'PATATAS', precio: '1.50€' }];
    const DEFAULT_EVENTOS = [
      'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23ff0000"/%3E%3Ctext x="100" y="110" fill="%23ffcc00" text-anchor="middle"%3EEVENTO%3C/text%3E%3C/svg%3E',
      'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23008000"/%3E%3Ctext x="100" y="110" fill="%23ffcc00"%3EFIESTA%3C/text%3E%3C/svg%3E'
    ];

    function cargarDatos() {
      const guardado = localStorage.getItem(STORAGE_KEY);
      if (guardado) {
        try {
          const data = JSON.parse(guardado);
          if (data.secciones) secciones = data.secciones;
          else secciones = data;
        } catch(e) {}
      }
      secciones.forEach(sec => {
        if (sec.tipo === 'productos' && (!sec.items || sec.items.length === 0)) {
          if (sec.id === 'extracciones') sec.items = JSON.parse(JSON.stringify(DEFAULT_EXTRA));
          else if (sec.id === 'hierbas') sec.items = JSON.parse(JSON.stringify(DEFAULT_HIERBAS));
          else if (sec.id === 'hash') sec.items = JSON.parse(JSON.stringify(DEFAULT_HASH));
          else sec.items = [];
        }
        if (sec.tipo === 'liados' && (!sec.items || sec.items.length === 0)) sec.items = JSON.parse(JSON.stringify(DEFAULT_LIADOS));
        if (sec.tipo === 'munchies' && (!sec.sub || !sec.sub.bebidas)) sec.sub = { bebidas: JSON.parse(JSON.stringify(DEFAULT_BEBIDAS)), picar: JSON.parse(JSON.stringify(DEFAULT_PICAR)) };
        if (sec.tipo === 'eventos' && (!sec.items || sec.items.length === 0)) sec.items = JSON.parse(JSON.stringify(DEFAULT_EVENTOS));
      });
      renderizarTodo();
    }

    function guardarCompleto() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ secciones: secciones }));
      mostrarIndicator();
    }

    function renderizarTodo() {
      renderPestanas();
      renderPaneles();
    }

    function renderPestanas() {
      const container = document.getElementById('pestanasContainer');
      container.innerHTML = '';
      secciones.forEach((sec, idx) => {
        const pest = document.createElement('div');
        pest.className = 'pestana';
        if (idx === 0) pest.classList.add('activa');
        let colorBorde = '#ffcc00';
        if (sec.tipo === 'liados') colorBorde = '#ffaa00';
        else if (sec.tipo === 'munchies') colorBorde = '#ff18d0';
        else if (sec.tipo === 'eventos') colorBorde = '#ffff00';
        pest.style.borderColor = colorBorde;
        pest.innerHTML = `<div class="pestana-icon">${sec.icono}</div><div class="pestana-text">${sec.nombre}</div>`;
        pest.addEventListener('click', () => {
          document.querySelectorAll('.pestana').forEach(p => p.classList.remove('activa'));
          pest.classList.add('activa');
          document.querySelectorAll('.panel').forEach((p, i) => { p.classList.toggle('activo', i === idx); });
        });
        container.appendChild(pest);
      });
    }

    function renderPaneles() {
      const contenedor = document.getElementById('contenidoPaneles');
      contenedor.innerHTML = '';
      secciones.forEach((sec, idx) => {
        const panel = document.createElement('div');
        panel.className = 'panel' + (idx === 0 ? ' activo' : '');
        let html = '';
        if (sec.tipo === 'productos') {
          html = `<div class="subseccion"><h3 class="subseccion-titulo">${sec.icono} ${sec.nombre}</h3><div class="productos-grid" id="grid-${sec.id}"></div></div>`;
        } else if (sec.tipo === 'liados') {
          html = `<div class="subseccion" style="border-color: #ffaa00;"><h3 class="subseccion-titulo" style="color: #ffaa00; border-left-color: #ffaa00;">🚬 ${sec.nombre}</h3><div class="liados-grid" id="grid-${sec.id}"></div></div>`;
        } else if (sec.tipo === 'munchies') {
          html = `<div><div class="munchies-categoria"><div class="categoria-titulo">🥤 BEBIDAS</div><div class="items-lista" id="bebidas-lista-${sec.id}"></div></div>
                  <div class="munchies-categoria"><div class="categoria-titulo">🍿 PICAR</div><div class="items-lista" id="picar-lista-${sec.id}"></div></div></div>`;
        } else if (sec.tipo === 'eventos') {
          html = `<div class="subseccion"><h3 class="subseccion-titulo">🎉 ${sec.nombre}</h3><div class="eventos-grid" id="eventos-grid-${sec.id}"></div></div>`;
        }
        panel.innerHTML = html;
        contenedor.appendChild(panel);
      });
      secciones.forEach(sec => {
        if (sec.tipo === 'productos') llenarProductos(sec);
        if (sec.tipo === 'liados') llenarLiados(sec);
        if (sec.tipo === 'munchies') llenarMunchies(sec);
        if (sec.tipo === 'eventos') llenarEventos(sec);
      });
    }

    function llenarProductos(sec) {
      const grid = document.getElementById(`grid-${sec.id}`);
      if (!grid) return;
      grid.innerHTML = '';
      sec.items.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'producto-card';
        card.innerHTML = `<img src="${item.img}"><h4>${item.nombre}</h4><div class="producto-precio">${item.precio}</div>`;
        grid.appendChild(card);
      });
    }

    function llenarLiados(sec) {
      const grid = document.getElementById(`grid-${sec.id}`);
      if (!grid) return;
      grid.innerHTML = '';
      sec.items.forEach((item) => {
        const div = document.createElement('div');
        div.className = 'liado-card';
        div.innerHTML = `<div class="liado-icon">🚬</div><h4>${item.nombre}</h4><div class="liado-precio">${item.precio}</div>`;
        grid.appendChild(div);
      });
    }

    function llenarMunchies(sec) {
      const bebidasDiv = document.getElementById(`bebidas-lista-${sec.id}`);
      const picarDiv = document.getElementById(`picar-lista-${sec.id}`);
      if (bebidasDiv) {
        bebidasDiv.innerHTML = '';
        sec.sub.bebidas.forEach(item => { bebidasDiv.innerHTML += `<div class="item-munchi"><span class="item-nombre">${item.nombre}</span><span class="item-precio">${item.precio}</span></div>`; });
      }
      if (picarDiv) {
        picarDiv.innerHTML = '';
        sec.sub.picar.forEach(item => { picarDiv.innerHTML += `<div class="item-munchi"><span class="item-nombre">${item.nombre}</span><span class="item-precio">${item.precio}</span></div>`; });
      }
    }

    function llenarEventos(sec) {
      const grid = document.getElementById(`eventos-grid-${sec.id}`);
      if (!grid) return;
      grid.innerHTML = '';
      sec.items.forEach((img, idx) => {
        const card = document.createElement('div');
        card.className = 'evento-card';
        card.innerHTML = `<img src="${img}"><button class="evento-delete" onclick="eliminarEvento('${sec.id}', ${idx})">✖</button>`;
        grid.appendChild(card);
      });
    }

    // ADMIN
    function mostrarLogin() {
      document.getElementById('panel-login').style.display = 'flex';
    }

    function cerrarLogin() {
      document.getElementById('panel-login').style.display = 'none';
      document.getElementById('login-password').value = '';
    }

    function comprobarLogin() {
      if (document.getElementById('login-password').value === CONTRASENA) {
        document.getElementById('panel-login').style.display = 'none';
        document.getElementById('panel-admin').style.display = 'block';
        document.getElementById('login-error').style.display = 'none';
        document.body.classList.add('admin-mode');
        renderAdminUI();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function cerrarAdmin() {
      document.getElementById('panel-admin').style.display = 'none';
      document.body.classList.remove('admin-mode');
    }

    function renderAdminUI() {
      const seccionesList = document.getElementById('seccionesAdminList');
      seccionesList.innerHTML = '<strong style="color:#ffcc00; margin-right:10px;">🗑️ Eliminar sección:</strong>';
      secciones.forEach((sec, idx) => {
        const btn = document.createElement('button');
        btn.textContent = `❌ ${sec.nombre}`;
        btn.style.background = '#ff0000';
        btn.style.color = 'white';
        btn.style.border = 'none';
        btn.style.borderRadius = '20px';
        btn.style.padding = '8px 16px';
        btn.style.cursor = 'pointer';
        btn.onclick = () => eliminarSeccion(idx);
        seccionesList.appendChild(btn);
      });

      const tabsContainer = document.getElementById('adminTabsContainer');
      tabsContainer.innerHTML = '';
      secciones.forEach((sec) => {
        const tab = document.createElement('button');
        tab.textContent = `${sec.icono} ${sec.nombre}`;
        tab.style.background = '#333';
        tab.style.border = '2px solid #ffcc00';
        tab.style.borderRadius = '20px';
        tab.style.padding = '10px 20px';
        tab.style.cursor = 'pointer';
        tab.style.color = '#ffcc00';
        tab.onclick = () => mostrarSeccionAdmin(sec.id);
        tabsContainer.appendChild(tab);
      });

      document.getElementById('addNewSectionBtn').onclick = () => añadirNuevaSeccion();
    }

    function eliminarSeccion(index) {
      if (secciones.length <= 1) {
        alert("No puedes eliminar la única sección que queda.");
        return;
      }
      if (confirm(`¿Eliminar la sección "${secciones[index].nombre}"?`)) {
        secciones.splice(index, 1);
        guardarCompleto();
        renderizarTodo();
        renderAdminUI();
        document.getElementById('admin-contenido').innerHTML = '<p style="color: white; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>';
      }
    }

    function añadirNuevaSeccion() {
      let nombre = prompt("Nombre de la nueva sección (ej: 'CREMAS', 'PIPAS'):");
      if (!nombre) return;
      let icono = prompt("Icono emoji (ej: 💎, 🧴, 🥨):", "📦");
      if (!icono) icono = "📦";
      let tipo = prompt("Tipo: 'productos', 'liados', 'eventos', 'munchies'", "productos");
      if (!['productos', 'liados', 'eventos', 'munchies'].includes(tipo)) tipo = "productos";
      
      const newId = "sec_" + Date.now();
      let nuevaSeccion = { id: newId, nombre: nombre.toUpperCase(), icono: icono, tipo: tipo };
      
      if (tipo === 'productos') nuevaSeccion.items = [];
      else if (tipo === 'liados') nuevaSeccion.items = [];
      else if (tipo === 'eventos') nuevaSeccion.items = [];
      else if (tipo === 'munchies') nuevaSeccion.sub = { bebidas: [], picar: [] };
      
      secciones.push(nuevaSeccion);
      guardarCompleto();
      renderizarTodo();
      renderAdminUI();
      mostrarSeccionAdmin(newId);
    }

    function mostrarSeccionAdmin(seccionId) {
      const sec = secciones.find(s => s.id === seccionId);
      if (!sec) return;
      
      let html = '';
      if (sec.tipo === 'productos') {
        html = `<h3 style="color: #ffcc00; margin-bottom: 20px;">${sec.icono} ${sec.nombre}</h3><div class="admin-grid">`;
        sec.items.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ffcc00;">
              <img src="${item.img}" id="admin-img-${sec.id}-${i}" class="admin-img">
              <input type="file" id="file-${sec.id}-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenProducto('${sec.id}', ${i})">
              <button onclick="document.getElementById('file-${sec.id}-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO</button>
              <input type="text" id="nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarProducto('${sec.id}', ${i}, 'nombre', this.value)">
              <input type="text" id="precio-${sec.id}-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarProducto('${sec.id}', ${i}, 'precio', this.value)">
              <button onclick="eliminarProductoItem('${sec.id}', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div><button onclick="añadirProductoItem(\'' + sec.id + '\')" style="width:100%; background:#ffcc00; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR PRODUCTO</button>';
      } 
      else if (sec.tipo === 'liados') {
        html = `<h3 style="color: #ffaa00; margin-bottom: 20px;">${sec.icono} ${sec.nombre}</h3><div class="admin-grid">`;
        sec.items.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ffaa00;">
              <div class="liado-icon" style="font-size: 5rem; text-align: center;">🚬</div>
              <input type="text" id="nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarProducto('${sec.id}', ${i}, 'nombre', this.value)">
              <input type="text" id="precio-${sec.id}-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarProducto('${sec.id}', ${i}, 'precio', this.value)">
              <button onclick="eliminarProductoItem('${sec.id}', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div><button onclick="añadirProductoItem(\'' + sec.id + '\')" style="width:100%; background:#ffaa00; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR LIADO</button>';
      }
      else if (sec.tipo === 'munchies') {
        html = `<h3 style="color: #ff18d0; margin-bottom: 20px;">${sec.icono} ${sec.nombre} - BEBIDAS</h3><div class="admin-grid">`;
        sec.sub.bebidas.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ff18d0;">
              <input type="text" id="bebida-nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarMunchi('${sec.id}', 'bebidas', ${i}, 'nombre', this.value)">
              <input type="text" id="bebida-precio-${sec.id}-${i}" value="${item.precio}" class="admin-precio" placeholder="Precio" onchange="actualizarMunchi('${sec.id}', 'bebidas', ${i}, 'precio', this.value)">
              <button onclick="eliminarMunchiItem('${sec.id}', 'bebidas', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div><button onclick="añadirMunchiItem(\'' + sec.id + '\', \'bebidas\')" style="width:100%; background:#ff18d0; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; color:white; cursor:pointer;">➕ AÑADIR BEBIDA</button>';
        
        html += `<h3 style="color: #ff18d0; margin-top: 30px; margin-bottom: 20px;">${sec.icono} ${sec.nombre} - PARA PICAR</h3><div class="admin-grid">`;
        sec.sub.picar.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ff18d0;">
              <input type="text" id="picar-nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarMunchi('${sec.id}', 'picar', ${i}, 'nombre', this.value)">
              <input type="text" id="picar-precio-${sec.id}-${i}" value="${item.precio}" class="admin-precio" placeholder="Precio" onchange="actualizarMunchi('${sec.id}', 'picar', ${i}, 'precio', this.value)">
              <button onclick="eliminarMunchiItem('${sec.id}', 'picar', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div><button onclick="añadirMunchiItem(\'' + sec.id + '\', \'picar\')" style="width:100%; background:#ff18d0; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; color:white; cursor:pointer;">➕ AÑADIR PRODUCTO</button>';
      }
      else if (sec.tipo === 'eventos') {
        html = `<h3 style="color: #ffff00; margin-bottom: 20px;">${sec.icono} ${sec.nombre}</h3><div class="admin-grid">`;
        sec.items.forEach((img, i) => {
          html += `
            <div class="admin-card" style="border-color: #ffff00;">
              <img src="${img}" id="evento-img-${sec.id}-${i}" class="admin-img">
              <input type="file" id="evento-file-${sec.id}-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenEvento('${sec.id}', ${i})">

              <button onclick="eliminarEvento('${sec.id}', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR CARTEL</button>

        html += '</div><button onclick="añadirEventoItem(\'' + sec.id + '\')" style="width:100%; background:#ffff00; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR NUEVO CARTEL</button>';

      document.getElementById('admin-contenido').innerHTML = html;

    function actualizarProducto(secId, index, campo, valor) {
      const sec = secciones.find(s => s.id === secId);
      if (sec && sec.items[index]) {
        sec.items[index][campo] = valor;
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function añadirProductoItem(secId) {
      const sec = secciones.find(s => s.id === secId);
      if (sec) {
        if (sec.tipo === 'productos') {
          sec.items.push({ img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ffcc00"/%3E%3Ctext x="50" y="55" fill="black"%3ENUEVO%3C/text%3E%3C/svg%3E', nombre: 'NUEVO PRODUCTO', precio: '0€' });
        } else if (sec.tipo === 'liados') {
          sec.items.push({ nombre: 'NUEVO LIADO', precio: '0€' });
        }
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function eliminarProductoItem(secId, index) {
      if (!confirm('¿Eliminar este producto?')) return;
      const sec = secciones.find(s => s.id === secId);
      if (sec && sec.items[index]) {
        sec.items.splice(index, 1);
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function actualizarMunchi(secId, subTipo, index, campo, valor) {
      const sec = secciones.find(s => s.id === secId);
      if (sec && sec.sub[subTipo][index]) {
        sec.sub[subTipo][index][campo] = valor;
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function añadirMunchiItem(secId, subTipo) {
      const sec = secciones.find(s => s.id === secId);
      if (sec) {
        sec.sub[subTipo].push({ nombre: 'NUEVO PRODUCTO', precio: '0€' });
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function eliminarMunchiItem(secId, subTipo, index) {
      if (!confirm('¿Eliminar este producto?')) return;
      const sec = secciones.find(s => s.id === secId);
      if (sec && sec.sub[subTipo][index]) {
        sec.sub[subTipo].splice(index, 1);
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function añadirEventoItem(secId) {
      const sec = secciones.find(s => s.id === secId);
      if (sec) {
        sec.items.push('data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23ffcc00"/%3E%3Ctext x="100" y="110" fill="black"%3ENUEVO%3C/text%3E%3C/svg%3E');
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    function eliminarEvento(secId, index) {
      if (!confirm('¿Eliminar este cartel?')) return;
      const sec = secciones.find(s => s.id === secId);
      if (sec && sec.items[index]) {
        sec.items.splice(index, 1);
        guardarCompleto();
        renderizarTodo();
        mostrarSeccionAdmin(secId);
      }
    }

    async function subirImagenProducto(secId, index) {
      const input = document.getElementById(`file-${secId}-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          const sec = secciones.find(s => s.id === secId);
          if (sec && sec.items[index]) {
            sec.items[index].img = imgComprimida;
            guardarCompleto();
            renderizarTodo();
            mostrarSeccionAdmin(secId);
          }
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function subirImagenEvento(secId, index) {
      const input = document.getElementById(`evento-file-${secId}-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          const sec = secciones.find(s => s.id === secId);
          if (sec && sec.items[index]) {
            sec.items[index] = imgComprimida;
            guardarCompleto();
            renderizarTodo();
            mostrarSeccionAdmin(secId);
          }
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function comprimirImagen(dataUrl, calidad = 0.7, maxAncho = 600) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let ancho = img.width;
          let alto = img.height;
          if (ancho > maxAncho) {
            alto = (maxAncho / ancho) * alto;
            ancho = maxAncho;
          }
          canvas.width = ancho;
          canvas.height = alto;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, ancho, alto);
          resolve(canvas.toDataURL('image/jpeg', calidad));
        };
        img.src = dataUrl;
      });
    }

    function guardarTodo() {
      guardarCompleto();
      alert("✅ Todos los cambios guardados correctamente");
    }

    function mostrarIndicator() {
      const indicator = document.getElementById('saveIndicator');
      indicator.style.display = 'block';
      setTimeout(() => indicator.style.display = 'none', 2000);
    }

    window.addEventListener('load', cargarDatos);
  </script>
