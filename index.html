<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <title>El Tio J · Catálogo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    body { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a2e 100%); display: flex; justify-content: center; align-items: center; padding: 12px; position: relative; }
    
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px); border: 4px solid; border-image: linear-gradient(135deg, #ff6b35, #f7c948, #4ecdc4, #ff6b35) 1; border-radius: 30px; box-shadow: 0 0 50px rgba(255, 107, 53, 0.3), inset 0 0 30px rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    
    .header { padding: 1.5rem 1.5rem 0.8rem; text-align: center; background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(247, 201, 72, 0.1), rgba(78, 205, 196, 0.2)); border-bottom: 3px solid #f7c948; }
    .logo-masquehigh { font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, #ff6b35, #f7c948, #4ecdc4, #ff6b35); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: none; line-height: 1.1; letter-spacing: 2px; }
    .logo-club { font-size: 3.8rem; font-weight: 900; letter-spacing: 15px; color: #f7c948; margin-top: -0.5rem; text-shadow: 0 0 15px #ff6b35; }
    .welcome { font-size: 1.6rem; color: #4ecdc4; background: rgba(78, 205, 196, 0.15); padding: 0.4rem 1.8rem; border-radius: 50px; display: inline-block; border: 1px solid #4ecdc4; letter-spacing: 1px; }
    
    .pestanas-wrapper { overflow-x: auto; padding: 1.2rem 1rem; background: rgba(0,0,0,0.3); }
    .pestanas { display: flex; gap: 1.2rem; min-width: max-content; }
    .pestana { background: rgba(20, 20, 40, 0.8); border: 2px solid; border-radius: 60px; padding: 0.9rem 2rem; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.25s ease; }
    .pestana-icon { font-size: 2rem; }
    .pestana-text { font-size: 1.3rem; font-weight: 700; white-space: nowrap; color: white; }
    .pestana.activa { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); box-shadow: 0 0 20px currentColor; }
    
    .contenido { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .panel { display: none; }
    .panel.activo { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .subseccion { background: rgba(10, 10, 20, 0.6); border-radius: 28px; padding: 1.5rem; margin-bottom: 1.5rem; backdrop-filter: blur(5px); }
    .subseccion-titulo { font-size: 2.2rem; font-weight: 800; margin-bottom: 1.2rem; padding-left: 1rem; border-left: 6px solid; }
    
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1.5rem; }
    .producto-card { background: rgba(15, 15, 25, 0.9); border: 2px solid; border-radius: 28px; padding: 1.5rem 1rem; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.25s ease; }
    .producto-card:hover { transform: translateY(-8px) scale(1.02); border-width: 3px; }
    .producto-card img { width: 130px; height: 130px; object-fit: cover; border-radius: 50%; border: 3px solid; margin-bottom: 1rem; }
    .producto-card h4 { font-size: 1.4rem; color: white; margin-bottom: 0.6rem; font-weight: 600; }
    .producto-precio { font-size: 1.6rem; font-weight: 800; padding: 0.4rem 1.2rem; border-radius: 50px; display: inline-block; background: rgba(0,0,0,0.4); border: 1px solid; }
    
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.5rem; }
    .liado-card { background: linear-gradient(145deg, #12122a, #0a0a1a); border: 2px solid; border-radius: 28px; padding: 1.8rem 1rem; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.25s ease; }
    .liado-card:hover { transform: translateY(-5px); border-width: 3px; }
    .liado-icon { font-size: 4.5rem; margin-bottom: 1rem; filter: drop-shadow(0 0 8px currentColor); }
    .liado-card h4 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.8rem; }
    .liado-precio { font-size: 1.5rem; font-weight: 800; padding: 0.4rem 1.5rem; border-radius: 50px; display: inline-block; background: rgba(0,0,0,0.4); border: 1px solid; }
    
    .munchies-categoria { background: rgba(8, 8, 20, 0.6); border-radius: 28px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid; }
    .categoria-titulo { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.2rem; display: inline-block; border-bottom: 3px solid; padding-bottom: 0.3rem; }
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.8rem; }
    .item-munchi { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.4); padding: 1rem 1.5rem; border-radius: 50px; border: 1px solid; transition: all 0.2s ease; }
    .item-munchi:hover { transform: translateX(6px); border-width: 2px; }
    .item-nombre { font-size: 1.4rem; color: #f0f0f0; font-weight: 500; text-transform: uppercase; }
    .item-precio { font-size: 1.5rem; font-weight: 800; }
    
    .eventos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .evento-card { background: transparent; border: 3px solid; border-radius: 24px; overflow: hidden; aspect-ratio: 1/1.2; position: relative; transition: all 0.25s ease; cursor: pointer; }
    .evento-card:hover { transform: scale(1.02); box-shadow: 0 0 30px currentColor; }
    .evento-card img { width: 100%; height: 100%; object-fit: cover; }
    .evento-delete { position: absolute; top: 10px; right: 10px; background: #ff3366; color: white; border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: none; z-index: 100; }
    .admin-mode .evento-delete { display: flex; align-items: center; justify-content: center; }
    
    .save-indicator { position: fixed; bottom: 100px; right: 30px; background: #4ecdc4; color: #1a1a2e; padding: 15px 28px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 0 30px #4ecdc4; z-index: 2100; display: none; border: 2px solid white; }

    /* Admin */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .admin-card { background: #111122; border: 2px solid; border-radius: 24px; padding: 18px; cursor: grab; transition: all 0.2s ease; }
    .admin-card:active { cursor: grabbing; }
    .admin-card.dragging { opacity: 0.5; }
    .admin-card.drag-over { border: 3px dashed; background: #1a1a35; }
    .admin-img { width: 100%; height: 200px; object-fit: cover; border-radius: 18px; margin-bottom: 12px; border: 2px solid; }
    .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #050510; border: 1px solid #333355; border-radius: 12px; color: white; font-size: 1.4rem; }
    .admin-input:focus { outline: none; border-color: currentColor; }
    .admin-precio { width: 100%; padding: 12px; margin-bottom: 10px; background: #050510; border: 2px solid; border-radius: 12px; font-size: 1.4rem; font-weight: bold; }
    .admin-file-input { display: none; }
    .admin-btn { width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1.4rem; cursor: pointer; margin-bottom: 8px; font-weight: bold; }
    .btn-upload { background: #2a2a4a; color: white; border: 1px solid; }
    .btn-delete { background: #ff3366; color: white; }
    .drag-handle { text-align: center; font-size: 1.2rem; margin-bottom: 12px; cursor: grab; background: rgba(255,255,255,0.08); border-radius: 30px; padding: 6px; border: 1px solid; }
    .drag-handle:active { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="kiosco">
    <div class="header">
      <div class="logo-masquehigh">EL TIO J</div>
      <div class="logo-club">CLUB</div>
      <div class="welcome">✨ Bienvenido a El Tio J Club ✨</div>
    </div>

    <div class="pestanas-wrapper">
      <div class="pestanas" id="pestanasContainer"></div>
    </div>

    <div class="contenido" id="contenidoPaneles"></div>
  </main>

  <!-- Botón ADMIN -->
  <div style="position: fixed; bottom: 30px; right: 30px; z-index: 2000;">
    <button id="btn-admin" onclick="mostrarLogin()" style="width: 80px; height: 80px; border-radius: 50%; background: #111122; border: 3px solid #ff6b35; color: #ff6b35; font-size: 36px; box-shadow: 0 0 20px #ff6b35; cursor: pointer;">⚙️</button>
  </div>

  <!-- PANEL LOGIN -->
  <div id="panel-login" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2001; align-items: center; justify-content: center;">
    <div style="background: #111122; border: 3px solid #ff6b35; border-radius: 50px; padding: 45px; width: 90%; max-width: 500px; box-shadow: 0 0 60px #ff6b35;">
      <h2 style="color: #ff6b35; text-align: center; font-size: 3rem; margin-bottom: 30px;">🔐 ADMIN</h2>
      <input type="password" id="login-password" placeholder="Contraseña" style="width: 100%; padding: 25px; font-size: 2rem; background: #050510; border: 2px solid #ff6b35; border-radius: 40px; color: white; margin-bottom: 30px; text-align: center;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <button onclick="comprobarLogin()" style="background: #4ecdc4; border: none; border-radius: 40px; padding: 22px; font-size: 2rem; font-weight: bold; color: #1a1a2e; cursor: pointer;">ENTRAR</button>
        <button onclick="cerrarLogin()" style="background: #2a2a4a; border: 2px solid #ff3366; border-radius: 40px; padding: 22px; font-size: 2rem; font-weight: bold; color: white; cursor: pointer;">CERRAR</button>
      </div>
      <p id="login-error" style="color: #ff3366; text-align: center; font-size: 1.6rem; margin-top: 20px; display: none;">❌ Contraseña incorrecta</p>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panel-admin" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; z-index: 2002; overflow-y: auto; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; background: #111122; padding: 20px; border-radius: 30px; border: 2px solid #ff6b35;">
      <h2 style="color: #f7c948; font-size: 2.5rem;">✏️ EDITAR TODO</h2>
      <div style="display: flex; gap: 10px;">
        <button id="addNewSectionBtn" style="background: #4ecdc4; border: none; border-radius: 50px; padding: 12px 28px; font-size: 1.4rem; font-weight: bold; color: #1a1a2e; cursor: pointer;">➕ AÑADIR SECCIÓN</button>
        <button onclick="cerrarAdmin()" style="background: #2a2a4a; border: 2px solid #ff3366; border-radius: 50px; padding: 12px 28px; font-size: 1.4rem; color: white; cursor: pointer;">CERRAR</button>
      </div>
    </div>
    <div id="seccionesAdminList" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; background: #111122; padding: 15px; border-radius: 20px;"></div>
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;" id="adminTabsContainer"></div>
    <div id="admin-contenido" style="background: #111122; border-radius: 30px; padding: 20px; margin-bottom: 20px;">
      <p style="color: #888; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>
    </div>
    <button onclick="guardarTodo()" style="width: 100%; background: linear-gradient(135deg, #ff6b35, #f7c948); border: none; border-radius: 60px; padding: 25px; font-size: 2.5rem; font-weight: bold; color: #1a1a2e; cursor: pointer;">💾 GUARDAR CAMBIOS</button>
  </div>

  <div id="saveIndicator" class="save-indicator">✅ GUARDADO</div>

  <script>
    const CONTRASENA = "alfre123";
    const STORAGE_KEY = 'eltioj_datos_secciones_v11';

    // NUEVA PALETA - FIESTA NEÓN
    const COLORES = {
      naranja: { color: '#ff6b35', glow: '#ff6b35', bg: 'rgba(255, 107, 53, 0.12)' },
      amarillo: { color: '#f7c948', glow: '#f7c948', bg: 'rgba(247, 201, 72, 0.12)' },
      turquesa: { color: '#4ecdc4', glow: '#4ecdc4', bg: 'rgba(78, 205, 196, 0.12)' },
      rosa: { color: '#ff6b9d', glow: '#ff6b9d', bg: 'rgba(255, 107, 157, 0.12)' },
      violeta: { color: '#c084fc', glow: '#c084fc', bg: 'rgba(192, 132, 252, 0.12)' },
      lima: { color: '#a3e635', glow: '#a3e635', bg: 'rgba(163, 230, 53, 0.12)' },
      coral: { color: '#fb7185', glow: '#fb7185', bg: 'rgba(251, 113, 133, 0.12)' },
      azul: { color: '#38bdf8', glow: '#38bdf8', bg: 'rgba(56, 189, 248, 0.12)' }
    };

    const COLORES_POR_TIPO = {
      extracciones: COLORES.rosa,
      hierbas: COLORES.lima,
      hash: COLORES.naranja,
      liados: COLORES.turquesa,
      munchies: COLORES.amarillo,
      eventos: COLORES.violeta
    };

    let secciones = [
      { id: "extracciones", nombre: "EXTRACCIONES", icono: "⚡", tipo: "productos", items: [], colorKey: "extracciones" },
      { id: "hierbas", nombre: "HIERBAS", icono: "🌿", tipo: "productos", items: [], colorKey: "hierbas" },
      { id: "hash", nombre: "HASH", icono: "🍫", tipo: "productos", items: [], colorKey: "hash" },
      { id: "liados", nombre: "LIADOS", icono: "🚬", tipo: "liados", items: [], colorKey: "liados" },
      { id: "munchies", nombre: "MUNCHIES", icono: "🍕", tipo: "munchies", sub: { bebidas: [], picar: [] }, colorKey: "munchies" },
      { id: "eventos", nombre: "EVENTOS", icono: "🎉", tipo: "eventos", items: [], colorKey: "eventos" }
    ];

    const DEFAULT_EXTRA = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff6b9d"/%3E%3Ctext x="50" y="55" fill="white" font-size="12" text-anchor="middle"%3EBHO%3C/text%3E%3C/svg%3E', nombre: 'BHO TROPICANA CHERRY', precio: '28€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%234ecdc4"/%3E%3Ctext x="50" y="55" fill="black" font-size="12"%3EICE%3C/text%3E%3C/svg%3E', nombre: 'ICE MAC1 PLUS', precio: '18€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23f7c948"/%3E%3Ctext x="50" y="55" fill="black"%3ETAITELLA%3C/text%3E%3C/svg%3E', nombre: 'TAITELLA', precio: '24€/g' }
    ];
    const DEFAULT_HIERBAS = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23a3e635"/%3E%3Ctext x="50" y="55" fill="black"%3ELONDON%3C/text%3E%3C/svg%3E', nombre: 'LONDON CAKE', precio: '8€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23fb7185"/%3E%3Ctext x="50" y="55" fill="white"%3EAMNESIA%3C/text%3E%3C/svg%3E', nombre: 'AMNESIA', precio: '4€/g' }
    ];
    const DEFAULT_HASH = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff6b35"/%3E%3Ctext x="50" y="55" fill="white"%3EGORILA%3C/text%3E%3C/svg%3E', nombre: 'GORILA', precio: '6€/g' }
    ];
    const DEFAULT_LIADOS = [
      { nombre: 'CRITICAL X GORILA', precio: '1x3€ | 2x5€' },
      { nombre: 'AMNESIA', precio: '1x3€ | 2x5€' }
    ];
    const DEFAULT_BEBIDAS = [{ nombre: 'COCACOLA', precio: '2€' }, { nombre: 'AGUA', precio: '1.50€' }];
    const DEFAULT_PICAR = [{ nombre: 'PATATAS', precio: '1.50€' }];
    const DEFAULT_EVENTOS = [
      'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23c084fc"/%3E%3Ctext x="100" y="110" fill="white" text-anchor="middle"%3EEVENTO%3C/text%3E%3C/svg%3E',
      'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%2338bdf8"/%3E%3Ctext x="100" y="110" fill="white"%3EFIESTA%3C/text%3E%3C/svg%3E'
    ];

    let draggedItem = null, draggedIndex = null, currentSecId = null;

    function getColorForSection(sec) {
      if (sec.colorKey && COLORES_POR_TIPO[sec.colorKey]) return COLORES_POR_TIPO[sec.colorKey];
      const coloresLista = Object.values(COLORES);
      const hash = (sec.id || sec.nombre).length;
      return coloresLista[hash % coloresLista.length];
    }

    function cargarDatos() {
      const guardado = localStorage.getItem(STORAGE_KEY);
      if (guardado) {
        try { const data = JSON.parse(guardado); if (data.secciones) secciones = data.secciones; else secciones = data; } catch(e) {}
      }
      secciones.forEach(sec => {
        if (!sec.colorKey) {
          if (sec.id === 'extracciones') sec.colorKey = 'extracciones';
          else if (sec.id === 'hierbas') sec.colorKey = 'hierbas';
          else if (sec.id === 'hash') sec.colorKey = 'hash';
          else if (sec.id === 'liados') sec.colorKey = 'liados';
          else if (sec.id === 'munchies') sec.colorKey = 'munchies';
          else if (sec.id === 'eventos') sec.colorKey = 'eventos';
          else sec.colorKey = 'turquesa';
        }
        if (sec.tipo === 'productos' && (!sec.items || sec.items.length === 0)) {
          if (sec.id === 'extracciones') sec.items = JSON.parse(JSON.stringify(DEFAULT_EXTRA));
          else if (sec.id === 'hierbas') sec.items = JSON.parse(JSON.stringify(DEFAULT_HIERBAS));
          else if (sec.id === 'hash') sec.items = JSON.parse(JSON.stringify(DEFAULT_HASH));
          else sec.items = [];
        }
        if (sec.tipo === 'liados' && (!sec.items || sec.items.length === 0)) sec.items = JSON.parse(JSON.stringify(DEFAULT_LIADOS));
        if (sec.tipo === 'munchies' && (!sec.sub || !sec.sub.bebidas)) sec.sub = { bebidas: JSON.parse(JSON.stringify(DEFAULT_BEBIDAS)), picar: JSON.parse(JSON.stringify(DEFAULT_PICAR)) };
        if (sec.tipo === 'eventos' && (!sec.items || sec.items.length === 0)) sec.items = JSON.parse(JSON.stringify(DEFAULT_EVENTOS));
      });
      renderizarTodo();
    }

    function guardarCompleto() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ secciones: secciones })); mostrarIndicator(); }

    function renderizarTodo() { renderPestanas(); renderPaneles(); }

    function renderPestanas() {
      const container = document.getElementById('pestanasContainer');
      container.innerHTML = '';
      secciones.forEach((sec, idx) => {
        const pest = document.createElement('div');
        pest.className = 'pestana';
        if (idx === 0) pest.classList.add('activa');
        const color = getColorForSection(sec);
        pest.style.borderColor = color.color;
        pest.style.color = color.color;
        if (pest.classList.contains('activa')) pest.style.boxShadow = `0 0 20px ${color.color}`;
        pest.innerHTML = `<div class="pestana-icon">${sec.icono}</div><div class="pestana-text">${sec.nombre}</div>`;
        pest.addEventListener('click', () => {
          document.querySelectorAll('.pestana').forEach(p => { p.classList.remove('activa'); p.style.boxShadow = ''; });
          pest.classList.add('activa');
          pest.style.boxShadow = `0 0 20px ${color.color}`;
          document.querySelectorAll('.panel').forEach((p, i) => { p.classList.toggle('activo', i === idx); });
        });
        container.appendChild(pest);
      });
    }

    function renderPaneles() {
      const contenedor = document.getElementById('contenidoPaneles');
      contenedor.innerHTML = '';
      secciones.forEach((sec, idx) => {
        const panel = document.createElement('div');
        panel.className = 'panel' + (idx === 0 ? ' activo' : '');
        let html = '';
        if (sec.tipo === 'productos') {
          html = `<div class="subseccion" style="border: 1px solid ${getColorForSection(sec).color};"><h3 class="subseccion-titulo" style="border-left-color: ${getColorForSection(sec).color}; color: ${getColorForSection(sec).color};">${sec.icono} ${sec.nombre}</h3><div class="productos-grid" id="grid-${sec.id}"></div></div>`;
        } else if (sec.tipo === 'liados') {
          html = `<div class="subseccion" style="border: 1px solid ${getColorForSection(sec).color};"><h3 class="subseccion-titulo" style="border-left-color: ${getColorForSection(sec).color}; color: ${getColorForSection(sec).color};">🚬 ${sec.nombre}</h3><div class="liados-grid" id="grid-${sec.id}"></div></div>`;
        } else if (sec.tipo === 'munchies') {
          html = `<div><div class="munchies-categoria" style="border-color: ${getColorForSection(sec).color};"><div class="categoria-titulo" style="color: ${getColorForSection(sec).color}; border-bottom-color: ${getColorForSection(sec).color};">🥤 BEBIDAS</div><div class="items-lista" id="bebidas-lista-${sec.id}"></div></div>
                  <div class="munchies-categoria" style="border-color: ${getColorForSection(sec).color};"><div class="categoria-titulo" style="color: ${getColorForSection(sec).color}; border-bottom-color: ${getColorForSection(sec).color};">🍿 PICAR</div><div class="items-lista" id="picar-lista-${sec.id}"></div></div></div>`;
        } else if (sec.tipo === 'eventos') {
          html = `<div class="subseccion" style="border: 1px solid ${getColorForSection(sec).color};"><h3 class="subseccion-titulo" style="border-left-color: ${getColorForSection(sec).color}; color: ${getColorForSection(sec).color};">🎉 ${sec.nombre}</h3><div class="eventos-grid" id="eventos-grid-${sec.id}"></div></div>`;
        }
        panel.innerHTML = html;
        contenedor.appendChild(panel);
      });
      secciones.forEach(sec => {
        if (sec.tipo === 'productos') llenarProductos(sec);
        if (sec.tipo === 'liados') llenarLiados(sec);
        if (sec.tipo === 'munchies') llenarMunchies(sec);
        if (sec.tipo === 'eventos') llenarEventos(sec);
      });
    }

    function llenarProductos(sec) {
      const grid = document.getElementById(`grid-${sec.id}`);
      if (!grid) return;
      const color = getColorForSection(sec);
      grid.innerHTML = '';
      sec.items.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'producto-card';
        card.style.borderColor = color.color;
        card.style.boxShadow = `0 0 15px ${color.glow}`;
        card.innerHTML = `<img src="${item.img}" style="border-color: ${color.color};"><h4>${item.nombre}</h4><div class="producto-precio" style="color: ${color.color}; border-color: ${color.color};">${item.precio}</div>`;
        grid.appendChild(card);
      });
    }

    function llenarLiados(sec) {
      const grid = document.getElementById(`grid-${sec.id}`);
      if (!grid) return;
      const color = getColorForSection(sec);
      grid.innerHTML = '';
      sec.items.forEach((item) => {
        const div = document.createElement('div');
        div.className = 'liado-card';
        div.style.borderColor = color.color;
        div.style.boxShadow = `0 0 15px ${color.glow}`;
        div.innerHTML = `<div class="liado-icon" style="filter: drop-shadow(0 0 8px ${color.color});">🚬</div><h4 style="color: ${color.color};">${item.nombre}</h4><div class="liado-precio" style="color: ${color.color}; border-color: ${color.color};">${item.precio}</div>`;
        grid.appendChild(div);
      });
    }

    function llenarMunchies(sec) {
      const color = getColorForSection(sec);
      const bebidasDiv = document.getElementById(`bebidas-lista-${sec.id}`);
      const picarDiv = document.getElementById(`picar-lista-${sec.id}`);
      if (bebidasDiv) {
        bebidasDiv.innerHTML = '';
        sec.sub.bebidas.forEach(item => { bebidasDiv.innerHTML += `<div class="item-munchi" style="border-color: ${color.color};"><span class="item-nombre">${item.nombre}</span><span class="item-precio" style="color: ${color.color};">${item.precio}</span></div>`; });
      }
      if (picarDiv) {
        picarDiv.innerHTML = '';
        sec.sub.picar.forEach(item => { picarDiv.innerHTML += `<div class="item-munchi" style="border-color: ${color.color};"><span class="item-nombre">${item.nombre}</span><span class="item-precio" style="color: ${color.color};">${item.precio}</span></div>`; });
      }
    }

    function llenarEventos(sec) {
      const grid = document.getElementById(`eventos-grid-${sec.id}`);
      if (!grid) return;
      const color = getColorForSection(sec);
      grid.innerHTML = '';
      sec.items.forEach((img, idx) => {
        const card = document.createElement('div');
        card.className = 'evento-card';
        card.style.borderColor = color.color;
        card.innerHTML = `<img src="${img}"><button class="evento-delete" onclick="eliminarEvento('${sec.id}', ${idx})">✖</button>`;
        grid.appendChild(card);
      });
    }

    // Drag & Drop
    function iniciarDrag(e, index, secId) { draggedIndex = index; currentSecId = secId; e.dataTransfer.setData('text/plain', index); e.target.closest('.admin-card')?.classList.add('dragging'); }
    function finalizarDrag(e) { if (e.target.closest('.admin-card')) e.target.closest('.admin-card').classList.remove('dragging'); draggedIndex = null; currentSecId = null; }
    function permitirDrop(e) { e.preventDefault(); }
    function soltarDrop(e, targetIndex, secId) {
      e.preventDefault();
      if (draggedIndex !== null && currentSecId === secId && draggedIndex !== targetIndex) {
        const sec = secciones.find(s => s.id === secId);
        if (sec && sec.items) { const [movedItem] = sec.items.splice(draggedIndex, 1); sec.items.splice(targetIndex, 0, movedItem); guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); }
      }
      document.querySelectorAll('.admin-card').forEach(card => card.classList.remove('drag-over', 'dragging'));
    }
    function marcarSobreDrop(e) { e.preventDefault(); const targetCard = e.target.closest('.admin-card'); if (targetCard) { document.querySelectorAll('.admin-card').forEach(card => card.classList.remove('drag-over')); targetCard.classList.add('drag-over'); } }
    function limpiarMarcador(e) { const targetCard = e.target.closest('.admin-card'); if (targetCard) targetCard.classList.remove('drag-over'); }

    // ADMIN
    function mostrarLogin() { document.getElementById('panel-login').style.display = 'flex'; document.getElementById('login-password').value = ''; }
    function cerrarLogin() { document.getElementById('panel-login').style.display = 'none'; document.getElementById('login-password').value = ''; document.getElementById('login-error').style.display = 'none'; }
    function comprobarLogin() {
      if (document.getElementById('login-password').value === CONTRASENA) {
        document.getElementById('panel-login').style.display = 'none'; document.getElementById('login-password').value = ''; document.getElementById('panel-admin').style.display = 'block'; document.getElementById('login-error').style.display = 'none'; document.body.classList.add('admin-mode'); renderAdminUI();
      } else { document.getElementById('login-error').style.display = 'block'; }
    }
    function cerrarAdmin() { document.getElementById('panel-admin').style.display = 'none'; document.body.classList.remove('admin-mode'); }

    function renderAdminUI() {
      const seccionesList = document.getElementById('seccionesAdminList');
      seccionesList.innerHTML = '<strong style="color:#ff6b35; margin-right:10px;">🗑️ Eliminar sección:</strong>';
      secciones.forEach((sec, idx) => { const color = getColorForSection(sec); const btn = document.createElement('button'); btn.textContent = `❌ ${sec.nombre}`; btn.style.background = color.color; btn.style.color = 'white'; btn.style.border = 'none'; btn.style.borderRadius = '20px'; btn.style.padding = '8px 16px'; btn.style.cursor = 'pointer'; btn.onclick = () => eliminarSeccion(idx); seccionesList.appendChild(btn); });
      const tabsContainer = document.getElementById('adminTabsContainer'); tabsContainer.innerHTML = '';
      secciones.forEach((sec) => { const color = getColorForSection(sec); const tab = document.createElement('button'); tab.textContent = `${sec.icono} ${sec.nombre}`; tab.style.background = color.bg; tab.style.border = `2px solid ${color.color}`; tab.style.borderRadius = '20px'; tab.style.padding = '10px 20px'; tab.style.cursor = 'pointer'; tab.style.color = color.color; tab.style.fontWeight = 'bold'; tab.onclick = () => mostrarSeccionAdmin(sec.id); tabsContainer.appendChild(tab); });
      document.getElementById('addNewSectionBtn').onclick = () => añadirNuevaSeccion();
    }

    function eliminarSeccion(index) { if (secciones.length <= 1) { alert("No puedes eliminar la única sección que queda."); return; } if (confirm(`¿Eliminar la sección "${secciones[index].nombre}"?`)) { secciones.splice(index, 1); guardarCompleto(); renderizarTodo(); renderAdminUI(); document.getElementById('admin-contenido').innerHTML = '<p style="color: #888; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>'; } }
    function añadirNuevaSeccion() {
      let nombre = prompt("Nombre de la nueva sección:"); if (!nombre) return;
      let icono = prompt("Icono emoji:", "📦"); if (!icono) icono = "📦";
      let tipo = prompt("Tipo: 'productos', 'liados', 'eventos', 'munchies'", "productos"); if (!['productos', 'liados', 'eventos', 'munchies'].includes(tipo)) tipo = "productos";
      const newId = "sec_" + Date.now(); const coloresLista = Object.keys(COLORES); const colorAleatorio = coloresLista[Math.floor(Math.random() * coloresLista.length)];
      let nuevaSeccion = { id: newId, nombre: nombre.toUpperCase(), icono: icono, tipo: tipo, colorKey: colorAleatorio };
      if (tipo === 'productos') nuevaSeccion.items = []; else if (tipo === 'liados') nuevaSeccion.items = []; else if (tipo === 'eventos') nuevaSeccion.items = []; else if (tipo === 'munchies') nuevaSeccion.sub = { bebidas: [], picar: [] };
      secciones.push(nuevaSeccion); guardarCompleto(); renderizarTodo(); renderAdminUI(); mostrarSeccionAdmin(newId);
    }

    function mostrarSeccionAdmin(seccionId) {
      const sec = secciones.find(s => s.id === seccionId); if (!sec) return; const color = getColorForSection(sec);
      let html = '';
      if (sec.tipo === 'productos') {
        html = `<h3 style="color: ${color.color}; margin-bottom: 20px;">${sec.icono} ${sec.nombre}</h3><div class="admin-grid" id="admin-grid-${sec.id}">`;
        sec.items.forEach((item, i) => { html += `<div class="admin-card" style="border-color: ${color.color};" draggable="true" data-index="${i}" data-secid="${sec.id}" ondragstart="iniciarDrag(event, ${i}, '${sec.id}')" ondragend="finalizarDrag(event)" ondragover="permitirDrop(event)" ondrop="soltarDrop(event, ${i}, '${sec.id}')" ondragenter="marcarSobreDrop(event)" ondragleave="limpiarMarcador(event)"><div class="drag-handle" style="color: ${color.color};">⋮⋮ ARRASTRAR ⋮⋮</div><img src="${item.img}" id="admin-img-${sec.id}-${i}" class="admin-img" style="border-color: ${color.color};"><input type="file" id="file-${sec.id}-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenProducto('${sec.id}', ${i})"><button onclick="document.getElementById('file-${sec.id}-${i}').click()" class="admin-btn btn-upload" style="border-color: ${color.color};">📷 CAMBIAR FOTO</button><input type="text" id="nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarProducto('${sec.id}', ${i}, 'nombre', this.value)"><input type="text" id="precio-${sec.id}-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" style="border-color: ${color.color}; color: ${color.color};" placeholder="Precio" onchange="actualizarProducto('${sec.id}', ${i}, 'precio', this.value)"><button onclick="eliminarProductoItem('${sec.id}', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="añadirProductoItem(\'' + sec.id + '\')" style="width:100%; background: ' + color.color + '; border: none; border-radius: 50px; padding: 15px; font-size: 1.6rem; margin-top: 10px; color: white; font-weight: bold; cursor: pointer;">➕ AÑADIR PRODUCTO</button>';
      } else if (sec.tipo === 'liados') {
        html = `<h3 style="color: ${color.color}; margin-bottom: 20px;">${sec.icono} ${sec.nombre}</h3><div class="admin-grid" id="admin-grid-${sec.id}">`;
        sec.items.forEach((item, i) => { html += `<div class="admin-card" style="border-color: ${color.color};" draggable="true" data-index="${i}" data-secid="${sec.id}" ondragstart="iniciarDrag(event, ${i}, '${sec.id}')" ondragend="finalizarDrag(event)" ondragover="permitirDrop(event)" ondrop="soltarDrop(event, ${i}, '${sec.id}')" ondragenter="marcarSobreDrop(event)" ondragleave="limpiarMarcador(event)"><div class="drag-handle" style="color: ${color.color};">⋮⋮ ARRASTRAR ⋮⋮</div><div class="liado-icon" style="font-size: 4rem; text-align: center;">🚬</div><input type="text" id="nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarProducto('${sec.id}', ${i}, 'nombre', this.value)"><input type="text" id="precio-${sec.id}-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" style="border-color: ${color.color}; color: ${color.color};" placeholder="Precio" onchange="actualizarProducto('${sec.id}', ${i}, 'precio', this.value)"><button onclick="eliminarProductoItem('${sec.id}', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="añadirProductoItem(\'' + sec.id + '\')" style="width:100%; background: ' + color.color + '; border: none; border-radius: 50px; padding: 15px; font-size: 1.6rem; margin-top: 10px; color: white; font-weight: bold; cursor: pointer;">➕ AÑADIR LIADO</button>';
      } else if (sec.tipo === 'munchies') {
        html = `<h3 style="color: ${color.color}; margin-bottom: 20px;">${sec.icono} ${sec.nombre} - BEBIDAS</h3><div class="admin-grid">`;
        sec.sub.bebidas.forEach((item, i) => { html += `<div class="admin-card" style="border-color: ${color.color};"><input type="text" id="bebida-nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarMunchi('${sec.id}', 'bebidas', ${i}, 'nombre', this.value)"><input type="text" id="bebida-precio-${sec.id}-${i}" value="${item.precio}" class="admin-precio" style="border-color: ${color.color}; color: ${color.color};" placeholder="Precio" onchange="actualizarMunchi('${sec.id}', 'bebidas', ${i}, 'precio', this.value)"><button onclick="eliminarMunchiItem('${sec.id}', 'bebidas', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="añadirMunchiItem(\'' + sec.id + '\', \'bebidas\')" style="width:100%; background: ' + color.color + '; border: none; border-radius: 50px; padding: 15px; font-size: 1.6rem; margin-top: 10px; color: white; font-weight: bold; cursor: pointer;">➕ AÑADIR BEBIDA</button>';
        html += `<h3 style="color: ${color.color}; margin-top: 30px; margin-bottom: 20px;">${sec.icono} ${sec.nombre} - PARA PICAR</h3><div class="admin-grid">`;
        sec.sub.picar.forEach((item, i) => { html += `<div class="admin-card" style="border-color: ${color.color};"><input type="text" id="picar-nombre-${sec.id}-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarMunchi('${sec.id}', 'picar', ${i}, 'nombre', this.value)"><input type="text" id="picar-precio-${sec.id}-${i}" value="${item.precio}" class="admin-precio" style="border-color: ${color.color}; color: ${color.color};" placeholder="Precio" onchange="actualizarMunchi('${sec.id}', 'picar', ${i}, 'precio', this.value)"><button onclick="eliminarMunchiItem('${sec.id}', 'picar', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
        html += '</div><button onclick="añadirMunchiItem(\'' + sec.id + '\', \'picar\')" style="width:100%; background: ' + color.color + '; border: none; border-radius: 50px; padding: 15px; font-size: 1.6rem; margin-top: 10px; color: white; font-weight: bold; cursor: pointer;">➕ AÑADIR PRODUCTO</button>';
      } else if (sec.tipo === 'eventos') {
        html = `<h3 style="color: ${color.color}; margin-bottom: 20px;">${sec.icono} ${sec.nombre}</h3><div class="admin-grid">`;
        sec.items.forEach((img, i) => { html += `<div class="admin-card" style="border-color: ${color.color};"><img src="${img}" id="evento-img-${sec.id}-${i}" class="admin-img" style="border-color: ${color.color};"><input type="file" id="evento-file-${sec.id}-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenEvento('${sec.id}', ${i})"><button onclick="document.getElementById('evento-file-${sec.id}-${i}').click()" class="admin-btn btn-upload" style="border-color: ${color.color};">📷 CAMBIAR FOTO</button><button onclick="eliminarEvento('${sec.id}', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR CARTEL</button></div>`; });
        html += '</div><button onclick="añadirEventoItem(\'' + sec.id + '\')" style="width:100%; background: ' + color.color + '; border: none; border-radius: 50px; padding: 15px; font-size: 1.6rem; margin-top: 10px; color: white; font-weight: bold; cursor: pointer;">➕ AÑADIR NUEVO CARTEL</button>';
      }
      document.getElementById('admin-contenido').innerHTML = html;
    }

    function actualizarProducto(secId, index, campo, valor) { const sec = secciones.find(s => s.id === secId); if (sec && sec.items[index]) { sec.items[index][campo] = valor; guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function añadirProductoItem(secId) { const sec = secciones.find(s => s.id === secId); if (sec) { if (sec.tipo === 'productos') { sec.items.push({ img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%234ecdc4"/%3E%3Ctext x="50" y="55" fill="black" font-size="12"%3ENUEVO%3C/text%3E%3C/svg%3E', nombre: 'NUEVO PRODUCTO', precio: '0€' }); } else if (sec.tipo === 'liados') { sec.items.push({ nombre: 'NUEVO LIADO', precio: '0€' }); } guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function eliminarProductoItem(secId, index) { if (!confirm('¿Eliminar este producto?')) return; const sec = secciones.find(s => s.id === secId); if (sec && sec.items[index]) { sec.items.splice(index, 1); guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function actualizarMunchi(secId, subTipo, index, campo, valor) { const sec = secciones.find(s => s.id === secId); if (sec && sec.sub[subTipo][index]) { sec.sub[subTipo][index][campo] = valor; guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function añadirMunchiItem(secId, subTipo) { const sec = secciones.find(s => s.id === secId); if (sec) { sec.sub[subTipo].push({ nombre: 'NUEVO PRODUCTO', precio: '0€' }); guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function eliminarMunchiItem(secId, subTipo, index) { if (!confirm('¿Eliminar este producto?')) return; const sec = secciones.find(s => s.id === secId); if (sec && sec.sub[subTipo][index]) { sec.sub[subTipo].splice(index, 1); guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function añadirEventoItem(secId) { const sec = secciones.find(s => s.id === secId); if (sec) { sec.items.push('data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23c084fc"/%3E%3Ctext x="100" y="110" fill="white" text-anchor="middle"%3ENUEVO%3C/text%3E%3C/svg%3E'); guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    function eliminarEvento(secId, index) { if (!confirm('¿Eliminar este cartel?')) return; const sec = secciones.find(s => s.id === secId); if (sec && sec.items[index]) { sec.items.splice(index, 1); guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }
    async function subirImagenProducto(secId, index) { const input = document.getElementById(`file-${secId}-${index}`); if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = async function(e) { const imgComprimida = await comprimirImagen(e.target.result); const sec = secciones.find(s => s.id === secId); if (sec && sec.items[index]) { sec.items[index].img = imgComprimida; guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }; reader.readAsDataURL(input.files[0]); } }
    async function subirImagenEvento(secId, index) { const input = document.getElementById(`evento-file-${secId}-${index}`); if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = async function(e) { const imgComprimida = await comprimirImagen(e.target.result); const sec = secciones.find(s => s.id === secId); if (sec && sec.items[index]) { sec.items[index] = imgComprimida; guardarCompleto(); renderizarTodo(); mostrarSeccionAdmin(secId); } }; reader.readAsDataURL(input.files[0]); } }
    function comprimirImagen(dataUrl, calidad = 0.7, maxAncho = 600) { return new Promise((resolve) => { const img = new Image(); img.onload = function() { const canvas = document.createElement('canvas'); let ancho = img.width; let alto = img.height; if (ancho > maxAncho) { alto = (maxAncho / ancho) * alto; ancho = maxAncho; } canvas.width = ancho; canvas.height = alto; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, ancho, alto); resolve(canvas.toDataURL('image/jpeg', calidad)); }; img.src = dataUrl; }); }
    function guardarTodo() { guardarCompleto(); alert("✅ Todos los cambios guardados correctamente"); }
    function mostrarIndicator() { const indicator = document.getElementById('saveIndicator'); indicator.style.display = 'block'; setTimeout(() => indicator.style.display = 'none', 2000); }
    window.addEventListener('load', cargarDatos);
  </script>
