<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a2a0a">
  <link rel="manifest" href="manifest.json">
  <title>El Tio J · Catálogo Rastafari</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1f0a;
    }

    body {
      background: radial-gradient(circle at 80% 20%, #1a3a1a 0%, #0a1a0a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      position: relative;
    }

    /* Fondo de marca estilo rasta */
    body::before {
      content: "EL TIO J";
      position: fixed;
      bottom: 10%;
      right: -10%;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: rgba(255, 0, 0, 0.04);
      white-space: nowrap;
      pointer-events: none;
      z-index: 1;
      transform: rotate(-15deg);
      letter-spacing: 8px;
    }

    /* Contenedor principal con bordes rasta */
    .kiosco {
      width: 100%;
      max-width: 1400px;
      height: 100%;
      background: rgba(8, 18, 8, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 2px solid;
      border-image: linear-gradient(135deg, #ff0000, #ffcc00, #008000) 1;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 204, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    /* Header rastafari */
    .header {
      padding: 1.2rem 1.8rem 0.8rem;
      text-align: center;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.1), rgba(0, 128, 0, 0.08));
      border-bottom: 3px solid #ffcc00;
    }

    .logo-masquehigh {
      font-size: 3.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff0000, #ffcc00, #008000);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
      letter-spacing: -1px;
    }

    .logo-club {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffcc00;
      text-shadow: 0 0 8px #ffcc00;
      margin-top: -0.3rem;
    }

    .welcome {
      font-size: 1.2rem;
      background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(0,128,0,0.2));
      display: inline-block;
      padding: 0.3rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      color: #ffcc00;
      font-weight: 500;
    }

    /* Pestañas dinámicas */
    .pestanas-wrapper {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.8rem 1rem;
      scrollbar-width: thin;
    }

    .pestanas {
      display: flex;
      gap: 0.8rem;
      min-width: max-content;
    }

    .pestana {
      background: rgba(10, 25, 10, 0.9);
      border: 2px solid #ffcc00;
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .pestana-icon {
      font-size: 1.6rem;
    }

    .pestana-text {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .pestana.activa {
      background: linear-gradient(135deg, rgba(255,0,0,0.3), rgba(0,128,0,0.3));
      border-color: #ffcc00;
      box-shadow: 0 0 15px #ffcc00;
      transform: scale(1.02);
    }

    /* contenido scroll */
    .contenido {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
    }

    .panel {
      display: none;
    }

    .panel.activo {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* tarjetas estilo rasta */
    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.2rem;
    }

    .producto-card, .liado-card {
      background: rgba(0, 15, 0, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1rem 0.8rem;
      text-align: center;
      transition: 0.2s;
      border: 1px solid #ffcc00;
    }

    .producto-card img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 30px;
      border: 2px solid #ffcc00;
      margin-bottom: 0.8rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .producto-card h4, .liado-card h4 {
      font-size: 1.2rem;
      color: #ffcc00;
      text-shadow: 0 0 5px #ff0000;
    }

    .producto-precio, .liado-precio {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(0,128,0,0.2));
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      margin-top: 8px;
      border: 1px solid #ffcc00;
      color: #ffcc00;
    }

    .liados-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }

    .liado-card {
      border-color: #ffcc00;
    }
    .liado-card h4 { color: #ffcc00; text-shadow: 0 0 6px #ff0000; }
    .liado-precio { border-color: #ffcc00; color: #ffcc00; }

    .munchies-categoria {
      background: rgba(0, 20, 0, 0.6);
      border-radius: 32px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      border-left: 6px solid #ff0000;
      border-right: 2px solid #ffcc00;
    }
    .categoria-titulo {
      font-size: 2rem;
      color: #ffcc00;
      text-shadow: 0 0 5px #ff0000;
      margin-bottom: 1rem;
    }
    .items-lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.8rem;
    }
    .item-munchi {
      display: flex;
      justify-content: space-between;
      background: #0a1a0a;
      padding: 0.7rem 1rem;
      border-radius: 60px;
      border: 1px solid #ffcc00;
    }
    .item-nombre { font-size: 1.2rem; color: #ffffff; }
    .item-precio { font-size: 1.3rem; font-weight: bold; color: #ffcc00; }

    /* EVENTOS GRID */
    .eventos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }
    .evento-card {
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #ffcc00;
      aspect-ratio: 1 / 1;
      position: relative;
      background: #000;
    }
    .evento-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .evento-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff0000;
      border: none;
      border-radius: 30px;
      width: 32px;
      height: 32px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      z-index: 20;
    }
    .admin-mode .evento-delete { display: block; }

    /* Admin boton flotante rasta */
    .admin-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 2000;
    }
    .admin-btn-flotante {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #ff0000, #008000);
      border: 2px solid #ffcc00;
      font-size: 32px;
      box-shadow: 0 0 25px #ffcc00;
      cursor: pointer;
      transition: 0.2s;
    }

    /* Paneles admin */
    .panel-admin-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #01010cee;
      backdrop-filter: blur(12px);
      z-index: 2100;
      overflow-y: auto;
      padding: 20px;
    }

    .admin-card {
      background: #0a1a0a;
      border-radius: 28px;
      padding: 1rem;
      border: 2px solid #ffcc00;
    }
    .admin-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .admin-input, .admin-precio {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: #000000aa;
      border: 1px solid #ffcc00;
      border-radius: 40px;
      color: white;
      font-size: 1rem;
    }
    .admin-btn {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }
    .btn-upload { background: #008000; color: white; }
    .btn-delete { background: #ff0000; color: white; }
    .btn-add-section { background: #ffcc00; color: black; margin-top: 8px; }
    .seccion-item-admin {
      background: #0a1f0a;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 28px;
      border-left: 8px solid #ffcc00;
      border-right: 2px solid #ff0000;
    }
    .save-indicator {
      position: fixed;
      bottom: 120px;
      right: 30px;
      background: #ffcc00;
      color: black;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      display: none;
      z-index: 2200;
    }
  </style>
</head>
<body>

<main class="kiosco">
  <div class="header">
    <div class="logo-masquehigh">EL TIO J</div>
    <div class="logo-club">RASTAFARI</div>
    <div class="welcome">🔥 CATÁLOGO DINÁMICO 🔥</div>
  </div>

  <div class="pestanas-wrapper">
    <div class="pestanas" id="pestanasContainer"></div>
  </div>

  <div class="contenido" id="contenidoPaneles"></div>
</main>

<div class="admin-fab">
  <button id="btnAdminMain" class="admin-btn-flotante">🔧</button>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000c; backdrop-filter:blur(12px); z-index:3000; align-items:center; justify-content:center;">
  <div style="background:#0a1a0a; border-radius:48px; padding:2rem; max-width:400px; width:90%; border:2px solid #ffcc00;">
    <h2 style="color:#ffcc00; font-size:2rem;">🔐 ADMIN</h2>
    <input type="password" id="adminPass" placeholder="contraseña" style="width:100%; padding:1rem; margin:1rem 0; border-radius:60px; background:#000; border:2px solid #ffcc00; color:white; font-size:1.4rem;">
    <div style="display:flex; gap:1rem;">
      <button id="loginSubmit" style="flex:1; background:#008000; border-radius:60px; padding:0.8rem; font-weight:bold; color:white;">ENTRAR</button>
      <button id="loginClose" style="flex:1; background:#ff0000; border-radius:60px; padding:0.8rem; color:white;">CERRAR</button>
    </div>
    <div id="loginError" style="color:#ffcc00; margin-top:1rem; text-align:center; display:none;">❌ Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL ADMIN PRINCIPAL -->
<div id="adminMainPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#03030cee; backdrop-filter:blur(12px); z-index:3001; overflow-y:auto; padding:20px;">
  <div style="max-width:1200px; margin:0 auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="color:#ffcc00;">✏️ GESTIÓN TOTAL - EL TIO J</h2>
      <button id="closeAdminBtn" style="background:#ff0000; border:none; border-radius:40px; padding:12px 28px; font-weight:bold; cursor:pointer; color:white;">CERRAR</button>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:28px;">
      <button id="addSectionBtnAdmin" style="background:#ffcc00; border:none; border-radius:40px; padding:12px 24px; font-weight:bold;">➕ AÑADIR SECCIÓN</button>
      <button id="editSectionsBtn" style="background:#008000; border:none; border-radius:40px; padding:12px 24px; font-weight:bold; color:white;">📂 GESTIONAR SECCIONES</button>
    </div>
    <div id="adminSectionsContainer"></div>
    <button id="globalSaveBtn" style="width:100%; background:#ffcc00; border-radius:60px; padding:18px; font-size:1.8rem; font-weight:bold; margin-top:20px;">💾 GUARDAR TODO</button>
  </div>
</div>

<div id="saveToast" class="save-indicator">✅ GUARDADO</div>

<script>
  const PASS = "situs123";
  const STORAGE_KEY = "eltioj_rasta_catalogo";

  // Estructura base: secciones dinámicas con temática rastafari
  let secciones = [
    { id: "extracciones", nombre: "EXTRACCIONES", icono: "⚡", tipo: "productos", items: [] },
    { id: "hierbas", nombre: "HIERBAS", icono: "🌿", tipo: "productos", items: [] },
    { id: "hash", nombre: "HASH", icono: "🍫", tipo: "productos", items: [] },
    { id: "liados", nombre: "LIADOS", icono: "🚬", tipo: "liados", items: [] },
    { id: "munchies", nombre: "MUNCHIES", icono: "🍕", tipo: "munchies", sub: { bebidas: [], picar: [] } },
    { id: "eventos", nombre: "EVENTOS", icono: "🎉", tipo: "eventos", items: [] }
  ];

  // datos por defecto con productos actualizados
  const DEFAULT_EXTRA = [
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff0000'/%3E%3Ctext x='50' y='55' fill='%23ffcc00' font-size='12' text-anchor='middle'%3EBHO%3C/text%3E%3C/svg%3E", nombre: "BHO TROPICANA CHERRY", precio: "28€/g" },
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23008000'/%3E%3Ctext x='50' y='55' fill='%23ffcc00' font-size='12' text-anchor='middle'%3EICE%3C/text%3E%3C/svg%3E", nombre: "ICE MAC1 PLUS", precio: "18€/g" },
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffcc00'/%3E%3Ctext x='50' y='55' fill='black'%3ETAITELLA%3C/text%3E%3C/svg%3E", nombre: "TAITELLA", precio: "24€/g" }
  ];
  const DEFAULT_HIERBAS = [
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23008000'/%3E%3Ctext x='50' y='55' fill='%23ffcc00'%3ELONDON%3C/text%3E%3C/svg%3E", nombre: "LONDON CAKE", precio: "8€/g" },
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff0000'/%3E%3Ctext x='50' y='55' fill='%23ffcc00'%3EAMNESIA%3C/text%3E%3C/svg%3E", nombre: "AMNESIA", precio: "4€/g" },
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffcc00'/%3E%3Ctext x='50' y='55' fill='black'%3ETANGIE%3C/text%3E%3C/svg%3E", nombre: "TANGIE", precio: "7€/g" }
  ];
  const DEFAULT_HASH = [
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23804020'/%3E%3Ctext x='50' y='55' fill='%23ffcc00'%3EGORILA%3C/text%3E%3C/svg%3E", nombre: "GORILA", precio: "6€/g" },
    { img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff0000'/%3E%3Ctext x='50' y='55' fill='%23ffcc00'%3ERUNTZ%3C/text%3E%3C/svg%3E", nombre: "RUNTZ", precio: "5€/g" }
  ];
  const DEFAULT_LIADOS = [
    { nombre: "CRITICAL X GORILA", precio: "1x3€ | 2x5€" },
    { nombre: "AMNESIA", precio: "1x3€ | 2x5€" },
    { nombre: "TROPICANA", precio: "1x3€ | 2x5€" }
  ];
  const DEFAULT_BEBIDAS = [{ nombre: "COCACOLA", precio: "2€" }, { nombre: "AGUA", precio: "1.50€" }, { nombre: "REDBULL", precio: "2.50€" }, { nombre: "MONSTER", precio: "2.50€" }];
  const DEFAULT_PICAR = [{ nombre: "PATATAS", precio: "1.50€" }, { nombre: "CHUCHAS", precio: "1.50€" }, { nombre: "PALOMITAS", precio: "1.20€" }];
  const DEFAULT_EVENTOS = ["data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23ff0000'/%3E%3Ctext x='100' y='110' fill='%23ffcc00' text-anchor='middle'%3EEVENTO%3C/text%3E%3C/svg%3E","data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23008000'/%3E%3Ctext x='100' y='110' fill='%23ffcc00'%3EFIESTA%3C/text%3E%3C/svg%3E"];

  function cargarDatos() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) {
      try {
        const data = JSON.parse(stored);
        if(data.secciones) secciones = data.secciones;
        else secciones = data;
      } catch(e) {}
    }
    if(secciones.length === 0) secciones = [...secciones];
    secciones.forEach(sec => {
      if(sec.tipo === 'productos' && !sec.items.length) {
        if(sec.id === 'extracciones') sec.items = JSON.parse(JSON.stringify(DEFAULT_EXTRA));
        else if(sec.id === 'hierbas') sec.items = JSON.parse(JSON.stringify(DEFAULT_HIERBAS));
        else if(sec.id === 'hash') sec.items = JSON.parse(JSON.stringify(DEFAULT_HASH));
        else sec.items = [];
      }
      if(sec.tipo === 'liados' && !sec.items.length) sec.items = JSON.parse(JSON.stringify(DEFAULT_LIADOS));
      if(sec.tipo === 'munchies' && (!sec.sub || !sec.sub.bebidas)) sec.sub = { bebidas: JSON.parse(JSON.stringify(DEFAULT_BEBIDAS)), picar: JSON.parse(JSON.stringify(DEFAULT_PICAR)) };
      if(sec.tipo === 'eventos' && !sec.items.length) sec.items = JSON.parse(JSON.stringify(DEFAULT_EVENTOS));
    });
    renderizarTodo();
  }

  function guardarCompleto() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(secciones));
    mostrarToast();
  }

  function renderizarTodo() {
    renderPestanas();
    renderPaneles();
  }

  function renderPestanas() {
    const container = document.getElementById('pestanasContainer');
    container.innerHTML = '';
    secciones.forEach((sec, idx) => {
      const pest = document.createElement('div');
      pest.className = 'pestana' + (idx === 0 ? ' activa' : '');
      pest.dataset.idx = idx;
      pest.innerHTML = `<div class="pestana-icon">${sec.icono}</div><div class="pestana-text">${sec.nombre}</div>`;
      pest.addEventListener('click', () => {
        document.querySelectorAll('.pestana').forEach(p => p.classList.remove('activa'));
        pest.classList.add('activa');
        document.querySelectorAll('.panel').forEach((p, i) => { p.classList.toggle('activo', i === idx); });
      });
      container.appendChild(pest);
    });
  }

  function renderPaneles() {
    const contenedorPaneles = document.getElementById('contenidoPaneles');
    contenedorPaneles.innerHTML = '';
    secciones.forEach((sec, idx) => {
      const panel = document.createElement('div');
      panel.className = 'panel' + (idx === 0 ? ' activo' : '');
      panel.id = `panel-${idx}`;
      let html = '';
      if(sec.tipo === 'productos') {
        html = `<div class="subseccion"><h3 class="categoria-titulo" style="color:#ffcc00;">${sec.icono} ${sec.nombre}</h3><div class="productos-grid" id="grid-${sec.id}"></div></div>`;
      } else if(sec.tipo === 'liados') {
        html = `<div><h3 class="categoria-titulo" style="color:#ffcc00;">🚬 ${sec.nombre}</h3><div class="liados-grid" id="grid-${sec.id}"></div></div>`;
      } else if(sec.tipo === 'munchies') {
        html = `<div><div class="munchies-categoria"><div class="categoria-titulo">🥤 BEBIDAS</div><div class="items-lista" id="bebidas-lista-${sec.id}"></div></div>
                <div class="munchies-categoria"><div class="categoria-titulo">🍿 PICAR</div><div class="items-lista" id="picar-lista-${sec.id}"></div></div></div>`;
      } else if(sec.tipo === 'eventos') {
        html = `<div><h3 class="categoria-titulo" style="color:#ffcc00;">🎉 ${sec.nombre}</h3><div class="eventos-grid" id="eventos-grid-${sec.id}"></div></div>`;
      }
      panel.innerHTML = html;
      contenedorPaneles.appendChild(panel);
    });
    secciones.forEach(sec => {
      if(sec.tipo === 'productos') llenarProductos(sec);
      if(sec.tipo === 'liados') llenarLiados(sec);
      if(sec.tipo === 'munchies') llenarMunchies(sec);
      if(sec.tipo === 'eventos') llenarEventos(sec);
    });
  }

  function llenarProductos(sec) {
    const grid = document.getElementById(`grid-${sec.id}`);
    if(!grid) return;
    grid.innerHTML = '';
    sec.items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'producto-card';
      card.innerHTML = `<img src="${item.img}" id="img-${sec.id}-${i}"><h4 id="nom-${sec.id}-${i}">${item.nombre}</h4><div class="producto-precio" id="precio-${sec.id}-${i}">${item.precio}</div>`;
      grid.appendChild(card);
    });
  }

  function llenarLiados(sec) {
    const grid = document.getElementById(`grid-${sec.id}`);
    if(!grid) return;
    grid.innerHTML = '';
    sec.items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'liado-card';
      div.innerHTML = `<div class="liado-icon">🚬</div><h4>${item.nombre}</h4><div class="liado-precio">${item.precio}</div>`;
      grid.appendChild(div);
    });
  }

  function llenarMunchies(sec) {
    const bebidasDiv = document.getElementById(`bebidas-lista-${sec.id}`);
    const picarDiv = document.getElementById(`picar-lista-${sec.id}`);
    if(bebidasDiv) {
      bebidasDiv.innerHTML = '';
      sec.sub.bebidas.forEach((item) => { bebidasDiv.innerHTML += `<div class="item-munchi"><span class="item-nombre">${item.nombre}</span><span class="item-precio">${item.precio}</span></div>`; });
    }
    if(picarDiv) {
      picarDiv.innerHTML = '';
      sec.sub.picar.forEach((item) => { picarDiv.innerHTML += `<div class="item-munchi"><span class="item-nombre">${item.nombre}</span><span class="item-precio">${item.precio}</span></div>`; });
    }
  }

  function llenarEventos(sec) {
    const grid = document.getElementById(`eventos-grid-${sec.id}`);
    if(!grid) return;
    grid.innerHTML = '';
    sec.items.forEach((img, idx) => {
      const card = document.createElement('div');
      card.className = 'evento-card';
      card.innerHTML = `<img src="${img}"><button class="evento-delete" data-sec="${sec.id}" data-evidx="${idx}">✖</button>`;
      grid.appendChild(card);
    });
  }

  // ADMIN
  document.getElementById('btnAdminMain').onclick = () => document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('loginClose').onclick = () => document.getElementById('loginModal').style.display = 'none';
  document.getElementById('loginSubmit').onclick = () => {
    if(document.getElementById('adminPass').value === PASS) {
      document.getElementById('loginModal').style.display = 'none';
      abrirAdminPanel();
    } else document.getElementById('loginError').style.display = 'block';
  };

  function abrirAdminPanel() {
    document.getElementById('adminMainPanel').style.display = 'block';
    renderAdminSections();
    document.body.classList.add('admin-mode');
  }
  document.getElementById('closeAdminBtn').onclick = () => {
    document.getElementById('adminMainPanel').style.display = 'none';
    document.body.classList.remove('admin-mode');
  };

  function renderAdminSections() {
    const container = document.getElementById('adminSectionsContainer');
    container.innerHTML = '';
    secciones.forEach((sec, idx) => {
      const secDiv = document.createElement('div');
      secDiv.className = 'seccion-item-admin';
      secDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;"><h3 style="color:#ffcc00;">${sec.icono} ${sec.nombre}</h3>
        <button class="admin-btn btn-delete" data-removeidx="${idx}" style="width:auto; padding:6px 18px;">🗑️ Eliminar Sección</button></div>
        <div style="margin-top:10px;"><button class="admin-btn btn-upload" data-editsec="${idx}">✏️ Editar contenido</button></div>
      `;
      container.appendChild(secDiv);
    });
    document.querySelectorAll('[data-removeidx]').forEach(btn => {
      btn.onclick = () => {
        let idx = parseInt(btn.dataset.removeidx);
        if(secciones.length <= 1) { alert("Debe haber al menos una sección"); return; }
        if(confirm(`¿Eliminar sección "${secciones[idx].nombre}"?`)) {
          secciones.splice(idx,1);
          renderizarTodo();
          renderAdminSections();
          guardarCompleto();
        }
      };
    });
    document.querySelectorAll('[data-editsec]').forEach(btn => {
      btn.onclick = () => abrirEditorSeccion(parseInt(btn.dataset.editsec));
    });
    document.getElementById('addSectionBtnAdmin').onclick = () => {
      let nombreNuevo = prompt("Nombre de nueva sección (ej: 'CREMAS')");
      if(!nombreNuevo) return;
      let icono = prompt("Ícono emoji (ej: 💎)", "💎");
      let tipo = prompt("Tipo: 'productos', 'liados', 'eventos', 'munchies'", "productos");
      if(!['productos','liados','eventos','munchies'].includes(tipo)) tipo="productos";
      const newId = "sec_"+Date.now();
      let nuevaSec = { id: newId, nombre: nombreNuevo.toUpperCase(), icono: icono || "📦", tipo: tipo };
      if(tipo === 'productos') nuevaSec.items = [];
      else if(tipo === 'liados') nuevaSec.items = [];
      else if(tipo === 'eventos') nuevaSec.items = [];
      else if(tipo === 'munchies') nuevaSec.sub = { bebidas: [], picar: [] };
      secciones.push(nuevaSec);
      renderizarTodo();
      renderAdminSections();
      guardarCompleto();
    };
    document.getElementById('editSectionsBtn').onclick = () => { alert("Puedes eliminar secciones con los botones rojos. Para editar productos usa 'Editar contenido'."); };
    document.getElementById('globalSaveBtn').onclick = () => { guardarCompleto(); alert("Todo guardado correctamente"); };
  }

  function abrirEditorSeccion(secIndex) {
    const sec = secciones[secIndex];
    let modal = document.createElement('div');
    modal.style.position='fixed'; modal.style.top='0'; modal.style.left='0'; modal.style.width='100%'; modal.style.height='100%'; modal.style.background='#000c'; modal.style.backdropFilter='blur(20px)'; modal.style.zIndex='4000'; modal.style.overflow='auto'; modal.style.padding='20px';
    modal.innerHTML = `<div style="max-width:700px; margin:auto; background:#0a1a0a; border-radius:32px; padding:20px; border:2px solid #ffcc00;"><div style="display:flex; justify-content:space-between;"><h2 style="color:#ffcc00;">✏️ Editando: ${sec.nombre}</h2><button id="closeEditorBtn" style="background:#ff0000; border:none; border-radius:60px; padding:8px 20px; color:white;">Cerrar</button></div><div id="dynamicEditorContainer"></div></div>`;
    document.body.appendChild(modal);
    const containerItems = modal.querySelector('#dynamicEditorContainer');
    
    function renderEditor() {
      if(sec.tipo === 'productos') {
        containerItems.innerHTML = '<h3 style="color:#ffcc00;">Productos</h3><div id="prodList"></div><button id="addItemBtn" class="admin-btn btn-add-section">➕ Añadir producto</button>';
        const prodDiv = containerItems.querySelector('#prodList');
        prodDiv.innerHTML = '';
        sec.items.forEach((item, idx) => {
          let div = document.createElement('div');
          div.className = 'admin-card';
          div.innerHTML = `<img src="${item.img}" style="width:80px; height:80px; object-fit:cover; border-radius:20px; margin-bottom:8px;"><br>
          <input type="file" class="imgUploader" data-idx="${idx}" accept="image/*">
          <button class="admin-btn btn-upload" data-upimg="${idx}">📷 Subir foto</button>
          <input type="text" value="${item.nombre.replace(/"/g,'&quot;')}" class="admin-input" data-field="nombre" data-idx="${idx}" placeholder="Nombre">
          <input type="text" value="${item.precio}" class="admin-precio" data-field="precio" data-idx="${idx}" placeholder="Precio">
          <button class="admin-btn btn-delete" data-del="${idx}">🗑️ Eliminar</button>`;
          prodDiv.appendChild(div);
        });
        for(let i=0;i<sec.items.length;i++) {
          const upBtn = prodDiv.querySelector(`[data-upimg="${i}"]`);
          if(upBtn) upBtn.onclick = () => { const fileInput = prodDiv.querySelector(`.imgUploader[data-idx="${i}"]`); if(fileInput) fileInput.click(); };
          const fileInput = prodDiv.querySelector(`.imgUploader[data-idx="${i}"]`);
          if(fileInput) fileInput.onchange = (e) => handleImageUploadSec(sec, i, e.target.files[0], modal);
        }
        prodDiv.querySelectorAll('[data-field="nombre"]').forEach(inp => {
          inp.onchange = (e) => { sec.items[inp.dataset.idx].nombre = e.target.value; renderEditor(); };
        });
        prodDiv.querySelectorAll('[data-field="precio"]').forEach(inp => {
          inp.onchange = (e) => { sec.items[inp.dataset.idx].precio = e.target.value; };
        });
        prodDiv.querySelectorAll('[data-del]').forEach(btn => {
          btn.onclick = () => { sec.items.splice(parseInt(btn.dataset.del),1); renderEditor(); };
        });
        const addBtn = containerItems.querySelector('#addItemBtn');
        if(addBtn) addBtn.onclick = () => { sec.items.push({ img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffcc00'/%3E%3Ctext x='50' y='55' fill='black'%3ENUEVO%3C/text%3E%3C/svg%3E", nombre: "Nuevo", precio: "0€" }); renderEditor(); };
      } else if(sec.tipo === 'liados') {
        containerItems.innerHTML = '<h3 style="color:#ffcc00;">Liados</h3><div id="liadosList"></div><button id="addLiadoBtn" class="admin-btn btn-add-section">➕ Añadir liado</button>';
        const listDiv = containerItems.querySelector('#liadosList');
        listDiv.innerHTML = '';
        sec.items.forEach((item, idx) => {
          let div = document.createElement('div');
          div.className = 'admin-card';
          div.innerHTML = `<input type="text" value="${item.nombre}" class="admin-input" data-lnombre="${idx}" placeholder="Nombre">
          <input type="text" value="${item.precio}" class="admin-precio" data-lprecio="${idx}" placeholder="Precio">
          <button class="admin-btn btn-delete" data-del="${idx}">🗑️ Eliminar</button>`;
          listDiv.appendChild(div);
        });
        listDiv.querySelectorAll('[data-lnombre]').forEach(inp => { inp.onchange = (e) => { sec.items[inp.dataset.lnombre].nombre = e.target.value; }; });
        listDiv.querySelectorAll('[data-lprecio]').forEach(inp => { inp.onchange = (e) => { sec.items[inp.dataset.lprecio].precio = e.target.value; }; });
        listDiv.querySelectorAll('[data-del]').forEach(btn => { btn.onclick = () => { sec.items.splice(parseInt(btn.dataset.del),1); renderEditor(); }; });
        containerItems.querySelector('#addLiadoBtn').onclick = () => { sec.items.push({ nombre: "Nuevo Liado", precio: "0€" }); renderEditor(); };
      } else {
        containerItems.innerHTML = '<p style="color:#ffcc00;">Edición para este tipo disponible en próximas versiones.</p>';
      }
    }
    renderEditor();
    modal.querySelector('#closeEditorBtn').onclick = () => { modal.remove(); renderizarTodo(); guardarCompleto(); };
  }

  async function handleImageUploadSec(sec, idx, file, modal) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const compressed = await comprimirImagen(e.target.result);
      sec.items[idx].img = compressed;
      if(modal) abrirEditorSeccion(secciones.findIndex(s => s.id === sec.id));
      renderizarTodo();
      guardarCompleto();
    };
    reader.readAsDataURL(file);
  }

  function comprimirImagen(dataUrl, calidad=0.7) { return new Promise(resolve => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300; const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0,300,300); resolve(canvas.toDataURL('image/jpeg',calidad)); }; img.src = dataUrl; }); }

  function mostrarToast() {
    const toast = document.getElementById('saveToast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 1800);
  }
  cargarDatos();
  setInterval(() => guardarCompleto(), 15000);
</script>
</body>
</html>
